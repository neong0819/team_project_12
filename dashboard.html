function ProductTab() {
  const { hasData, start, end } = useDateRange();
  const { search, consumeSearch } = useSearch();
  const { data: realProduct } = useRealData('product');
  const [catDrilldown, setCatDrilldown] = useState(null);
  const [highlightCategory, setHighlightCategory] = useState(null);
  const periodPartial = !isFullRange(start, end);

  // 실데이터 → 기존 차트 포맷으로 변환
  // TOP_CATEGORIES 포맷: { name, 매출(억원), 건수 }
  const topCategories = useMemo(() => {
    // 기간이 부분 선택된 경우 by_date 에서 재집계
    if (periodPartial && realProduct?.by_date?.length) {
      const filtered = filterByRange(realProduct.by_date, start, end);
      const agg = aggregateBy(filtered, 'category', ['orders', 'revenue']);
      agg.sort((a, b) => b.revenue - a.revenue);
      return agg.slice(0, 10).map(c => ({
        name: c.category,
        매출: +(c.revenue / 1e8).toFixed(1),
        건수: c.orders,
      }));
    }
    if (realProduct?.category_top?.length) {
      return realProduct.category_top.map(c => ({
        name: c.category,
        매출: +(c.revenue / 1e8).toFixed(1),  // 억원 단위
        건수: c.orders
      }));
    }
    return TOP_CATEGORIES;
  }, [realProduct, start, end, periodPartial]);

  const categoryTreemap = useMemo(() => {
    if (periodPartial && realProduct?.by_date?.length) {
      const filtered = filterByRange(realProduct.by_date, start, end);
      const agg = aggregateBy(filtered, 'category', ['revenue']);
      agg.sort((a, b) => b.revenue - a.revenue);
      return agg.slice(0, 12).map((c, i) => ({
        name: c.category,
        size: +(c.revenue / 1e8).toFixed(1),
        fill: CHART_COLORS[i % CHART_COLORS.length],
      }));
    }
    if (realProduct?.category_share?.length) {
      return realProduct.category_share.map((c, i) => ({
        name: c.name,
        size: +(c.value / 1e8).toFixed(1),
        fill: CHART_COLORS[i % CHART_COLORS.length]
      }));
    }
    return CATEGORY_TREEMAP;
  }, [realProduct, start, end, periodPartial]);

  const priceVsSales = useMemo(() => {
    if (realProduct?.scatter?.length) {
      return realProduct.scatter.map(p => ({
        price: +(p.price / 10000).toFixed(1),  // 만원 단위
        sales: p.sales,
        category: p.category,
        name: p.name
      }));
    }
    return PRICE_VS_SALES;
  }, [realProduct]);

  useEffect(() => {
    const payload = consumeSearch('product');
    if (payload && payload.kind === 'category') {
      setHighlightCategory(payload.value);
      // 자동으로 해당 카테고리 드릴다운 열기
      const found = topCategories.find(c => c.name === payload.value);
      if (found) setCatDrilldown(found);
    }
  }, [search]);

  return (
    <div className="space-y-3">
      {highlightCategory && (
        <div className="flex items-center gap-2 px-3 py-2 bg-blue-50 border border-blue-200 rounded-lg text-[12px]">
          <Icon name="filter" className="w-3.5 h-3.5 text-blue-600" />
          <span className="text-blue-900">
            검색에서 <strong>{highlightCategory}</strong> 카테고리 강조 중
          </span>
          <button onClick={() => setHighlightCategory(null)} className="ml-auto text-blue-600 hover:text-blue-800 text-[11px]">해제</button>
        </div>
      )}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
        <KPICard empty={!hasData} label="총 상품 수" value="32,951" change="+2.1%" trend="up" sub="활성 카테고리 73개" />
        <KPICard empty={!hasData} label="인기 카테고리" value="침구/홈패브릭" sub="매출 ₩125억 (22%)" />
        <KPICard empty={!hasData} label="평균 상품 가격" value="₩41,800" change="+1.8%" trend="up" sub="중앙값 ₩28,000" />
        <KPICard empty={!hasData} label="카테고리 수" value="73" sub="상위 10개가 매출 68%" />
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-2">
        <ChartCard empty={!hasData} title="TOP 10 카테고리" unit="매출 기준 · 클릭 → 상세" aiComment="뷰티/건강 카테고리가 침구를 빠르게 추격 중. 3분기 역전 가능성." height={320}>
          <ResponsiveContainer>
            <BarChart data={topCategories} layout="vertical" margin={{ left: 0 }}>
              <CartesianGrid strokeDasharray={GRID_DASH} stroke={GRID_STROKE} horizontal={false} />
              <XAxis type="number" tick={AXIS_TICK} tickLine={TICK_LINE} axisLine={AXIS_LINE} />
              <YAxis type="category" dataKey="name" tick={AXIS_TICK} tickLine={TICK_LINE} axisLine={AXIS_LINE} width={110} />
              <Tooltip content={<RichTooltip formatter={(v) => fmtNum(v) + ' 억원'} hint="클릭 시 카테고리 상세" />} cursor={{ fill: 'rgba(37,99,235,0.05)' }} />
              <Bar dataKey="매출" radius={BAR_RADIUS_H}
                onClick={(d) => setCatDrilldown(d)} style={{ cursor: 'pointer' }}>
                {topCategories.map((c, i) => {
                  const isHi = highlightCategory === c.name;
                  // 팀원 B ShopIQ DNA — 피크 3단 (emerald → cobalt → muted)
                  const bar = i === 0 ? COLORS.emeraldA : (i < 3 ? COLORS.cobaltA : (i < 6 ? COLORS.cobaltL.replace('0.10','0.40') : COLORS.mutedBar));
                  return (
                    <Cell key={i}
                      fill={isHi ? COLORS.amberA : bar}
                      opacity={!highlightCategory || isHi ? 1 : 0.35} />
                  );
                })}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </ChartCard>

        <ChartCard empty={!hasData} title="카테고리 점유율" unit="매출 기준 TOP 10" height={320}>
          <ResponsiveContainer>
            <Treemap data={categoryTreemap} dataKey="size" stroke="#fff" />
          </ResponsiveContainer>
        </ChartCard>

        <ChartCard empty={!hasData} title="가격 vs 판매량" unit="상관관계" aiComment="저가 상품 + 높은 판매량 조합이 전체 매출의 60% 차지." height={280}>
          <ResponsiveContainer>
            <ScatterChart margin={{ top: 10, right: 10, bottom: 5, left: 0 }}>
              <CartesianGrid strokeDasharray={GRID_DASH} stroke={GRID_STROKE} />
              <XAxis type="number" dataKey="price" name="가격(만원)" tick={AXIS_TICK} tickLine={TICK_LINE} axisLine={AXIS_LINE} />
              <YAxis type="number" dataKey="sales" name="판매량" tick={AXIS_TICK} tickLine={TICK_LINE} axisLine={AXIS_LINE} />
              <Tooltip content={<RichTooltip formatter={(v, n) => n === '가격(만원)' ? v + '만원' : fmtNum(v) + '건'} />} cursor={{ strokeDasharray: '3 3' }} />
              <Scatter data={priceVsSales} fill={COLORS.cobaltA} fillOpacity={0.7} stroke={COLORS.cobalt} strokeWidth={0.5} />
            </ScatterChart>
          </ResponsiveContainer>
        </ChartCard>

        <ChartCard empty={!hasData} title="카테고리별 건수 vs 매출" unit="TOP 6" height={280}>
          <ResponsiveContainer>
            <BarChart data={topCategories.slice(0, 6)}>
              <CartesianGrid strokeDasharray={GRID_DASH} stroke={GRID_STROKE} vertical={false} />
              <XAxis dataKey="name" tick={{ fontSize: 10, fill: '#6B7280', fontWeight: 500 }} angle={-15} textAnchor="end" height={60} tickLine={TICK_LINE} axisLine={AXIS_LINE} />
              <YAxis yAxisId="left" tick={AXIS_TICK} tickLine={TICK_LINE} axisLine={AXIS_LINE} />
              <YAxis yAxisId="right" orientation="right" tick={AXIS_TICK} tickLine={TICK_LINE} axisLine={AXIS_LINE} />
              <Tooltip content={<RichTooltip formatter={(v, n) => n === '매출' ? v + ' 억원' : fmtNum(v) + '건'} />} cursor={{ fill: 'rgba(37,99,235,0.05)' }} />
              <Legend wrapperStyle={{ fontSize: 11 }} />
              <Bar yAxisId="left" dataKey="매출" fill={COLORS.cobaltA} radius={BAR_RADIUS} />
              <Bar yAxisId="right" dataKey="건수" fill={COLORS.emeraldA} radius={BAR_RADIUS} />
            </BarChart>
          </ResponsiveContainer>
        </ChartCard>
      </div>

      {/* 팀원 B 흡수 — 카테고리 성장률 YoY + 반품률 */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-2">
        <ChartCard empty={!hasData} title="카테고리 성장률 (YoY)"
          unit="전년 동기 대비 · 플러스(에메랄드) / 마이너스(크림슨)"
          aiComment="뷰티/건강 +28% 최고 성장. 침구/홈데코 -4%, 게임기 -7% 역성장 주의."
          height={300}>
          <ResponsiveContainer>
            <BarChart data={CATEGORY_GROWTH} layout="vertical" margin={{ left: 10 }}>
              <CartesianGrid strokeDasharray={GRID_DASH} stroke={GRID_STROKE} horizontal={false} />
              <XAxis type="number" tick={AXIS_TICK} tickLine={TICK_LINE} axisLine={AXIS_LINE} tickFormatter={(v) => v + '%'} />
              <YAxis type="category" dataKey="category" tick={AXIS_TICK} tickLine={TICK_LINE} axisLine={AXIS_LINE} width={110} />
              <Tooltip content={<RichTooltip formatter={(v) => (v > 0 ? '+' : '') + v + '%'} />} cursor={{ fill: 'rgba(28,95,255,0.05)' }} />
              <ReferenceLine x={0} stroke="#AEAEB2" strokeWidth={1} />
              <Bar dataKey="growth" radius={BAR_RADIUS_H}>
                {CATEGORY_GROWTH.map((c, i) => (
                  <Cell key={i} fill={c.growth >= 20 ? COLORS.emeraldA : c.growth >= 0 ? COLORS.cobaltA : COLORS.crimsonA} />
                ))}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </ChartCard>

        <ChartCard empty={!hasData} title="카테고리 반품률" unit="기준선(점선) 대비 초과 카테고리 주의"
          aiComment="패션 카테고리 반품률 11~14%로 평균(8.5%) 초과. 사이즈 가이드 개선 필요."
          height={300}>
          <ResponsiveContainer>
            <BarChart data={CATEGORY_RETURN} layout="vertical" margin={{ left: 10 }}>

              <XAxis type="number" tick={AXIS_TICK} tickLine={TICK_LINE} axisLine={AXIS_LINE} tickFormatter={(v) => v + '%'} />
              <YAxis type="category" dataKey="category" tick={AXIS_TICK} tickLine={TICK_LINE} axisLine={AXIS_LINE} width={110} />
              <Tooltip content={<RichTooltip formatter={(v) => v + '%'} />} cursor={{ fill: 'rgba(28,95,255,0.05)' }} />
              <Bar dataKey="반품률" radius={BAR_RADIUS_H}>
                {CATEGORY_RETURN.map((c, i) => (

                ))}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </ChartCard>
      </div>

      <DrilldownModal
        open={!!catDrilldown}
        onClose={() => setCatDrilldown(null)}
        title={`${catDrilldown?.name || ''} 카테고리 상세`}
        subtitle="매출·건수·TOP 상품·리뷰 스코어"
      >
        {catDrilldown && (

              </div>
              <div className="bg-violet-50 rounded-lg p-3 border border-violet-100">
                <div className="text-[11px] text-violet-700 font-medium">평균 객단가</div>

            <div className="bg-violet-50 rounded-lg p-3 border border-violet-100 flex gap-2">

              <div className="text-[12px] text-violet-900 leading-relaxed">
                <span className="font-semibold">AI 분석:</span> {catDrilldown.name} 카테고리는 30~40대 여성 고객 비중이 높고, 재구매 주기가 짧은 편.
                관련 상품 번들 프로모션과 리타겟팅 광고 효과가 큼.
              </div>
            </div>
          </div>
        )}
      </DrilldownModal>
    </div>
  );
}

/* =========================================================
 * 탭 3. 고객/지역
 * ========================================================= */
function RegionTab() {
  const { hasData, start, end } = useDateRange();
  const { search, consumeSearch } = useSearch();
  const { data: realRegion } = useRealData('region');
  const { data: realCustomer } = useRealData('customer');
  const [selectedRegion, setSelectedRegion] = useState(null);
  const periodPartial = !isFullRange(start, end);

  // 검색에서 넘어온 지역 필터 자동 적용
  useEffect(() => {
    const payload = consumeSearch('region');
    if (payload && payload.kind === 'region') {
      setSelectedRegion(payload.value);
    }
  }, [search]);

  // 실데이터 region → 기존 REGION_DATA 포맷
  const regionData = useMemo(() => {
    if (periodPartial && realRegion?.by_date?.length) {
      const filtered = filterByRange(realRegion.by_date, start, end);
      const agg = aggregateBy(filtered, 'region', ['orders', 'revenue']);
      return agg.map(r => ({
        region: r.region,
        주문: r.orders,
        매출: +(r.revenue / 1e8).toFixed(1),
      }));
    }
    if (realRegion?.rows?.length) {
      return realRegion.rows.map(r => ({
        region: r.region,
        주문: r.orders,
        매출: +(r.revenue / 1e8).toFixed(1)  // 억원 단위
      }));
    }
    return REGION_DATA;
  }, [realRegion, start, end, periodPartial]);

  // 신규 vs 재구매 추이
  const newVsRepeat = useMemo(() => {
    // 부분 기간: 일별을 주 단위로 묶어 시계열 표시
    if (periodPartial && realCustomer?.by_date?.new_vs_repeat?.length) {
      const filtered = filterByRange(realCustomer.by_date.new_vs_repeat, start, end);
      // 단순히 일별 → 기간 내 합계도 부담되면 그대로 일자 라벨
      if (filtered.length <= 14) {
        return filtered.map(r => ({
          month: r.date.slice(5),  // MM-DD
          신규: r.신규,
          재구매: r.재구매,
        }));
      }
      // 주 단위 그룹
      const weekMap = new Map();
      filtered.forEach(r => {
        const d = new Date(r.date);
        const y = d.getFullYear();
        const firstDay = new Date(y, 0, 1);
        const week = Math.ceil(((d - firstDay) / 86400000 + firstDay.getDay() + 1) / 7);
        const key = `${y}-W${week}`;
        if (!weekMap.has(key)) weekMap.set(key, { month: key.slice(5), 신규: 0, 재구매: 0 });
        weekMap.get(key).신규 += r.신규;
        weekMap.get(key).재구매 += r.재구매;
      });
      return Array.from(weekMap.values());
    }
    if (realCustomer?.new_vs_repeat?.length) {
      return realCustomer.new_vs_repeat.map(r => ({
        month: r.month.slice(5) + '월',
        신규: r.신규,
        재구매: r.재구매
      }));
    }
    return NEW_CUSTOMERS;
  }, [realCustomer, start, end, periodPartial]);

  const totalOrders = useMemo(() => regionData.reduce((s, r) => s + r.주문, 0), [regionData]);
  const totalRevenue = useMemo(() => regionData.reduce((s, r) => s + r.매출, 0), [regionData]);

  const cityData = useMemo(() => ([
    { city: '서울 강남구', region: '서울', 주문: 8234, pct: 8.3 },
    { city: '서울 서초구', region: '서울', 주문: 6128, pct: 6.2 },
    { city: '경기 수원시', region: '경기', 주문: 5412, pct: 5.4 },
    { city: '서울 송파구', region: '서울', 주문: 4987, pct: 5.0 },
    { city: '경기 성남시', region: '경기', 주문: 4321, pct: 4.3 },
    { city: '부산 해운대구', region: '부산', 주문: 3876, pct: 3.9 },
    { city: '서울 마포구', region: '서울', 주문: 3654, pct: 3.7 },
    { city: '경기 고양시', region: '경기', 주문: 3210, pct: 3.2 },
    { city: '서울 영등포구', region: '서울', 주문: 2987, pct: 3.0 },
    { city: '인천 연수구', region: '인천', 주문: 2645, pct: 2.7 }
  ]), []);

  const selectedData = selectedRegion ? regionData.find(r => r.region === selectedRegion) : null;
  const visibleCities = selectedRegion ? cityData.filter(c => c.region === selectedRegion) : cityData;

  const selectedOrders = selectedData?.주문 ?? totalOrders;
  const selectedRevenue = selectedData?.매출 ?? totalRevenue;
  const selectedShare = selectedData ? (selectedData.주문 / totalOrders * 100).toFixed(1) : '100.0';

  return (
    <div className="space-y-3">
      {/* 필터 바 */}
      <div className="flex flex-wrap items-center gap-1.5">
        <span className="text-[11px] text-gray-500 font-medium mr-1">지역 필터:</span>
        <button
          onClick={() => setSelectedRegion(null)}
          className={`text-[11px] px-2.5 py-1 rounded-full border transition-all ${
            !selectedRegion ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-600 border-gray-200 hover:border-blue-300'
          }`}>
          전체
        </button>
        {regionData.slice(0, 8).map(r => (
          <button key={r.region}
            onClick={() => setSelectedRegion(selectedRegion === r.region ? null : r.region)}
            className={`text-[11px] px-2.5 py-1 rounded-full border transition-all ${
              selectedRegion === r.region ? 'bg-blue-600 text-white border-blue-600 shadow-sm' : 'bg-white text-gray-600 border-gray-200 hover:border-blue-300'
            }`}>
            {r.region}
          </button>
        ))}
        {selectedRegion && (
          <span className="text-[11px] text-blue-600 font-medium ml-2 flex items-center gap-1">
            <Icon name="filter" className="w-3 h-3" />
            {selectedRegion} 필터 적용 중
          </span>
        )}
      </div>

      <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
        <KPICard empty={!hasData} label={selectedRegion ? `${selectedRegion} 주문 수` : "총 주문 수"}
          value={fmtNum(selectedOrders)}
          change={selectedRegion ? `${selectedShare}% 점유` : "+8.2%"}
          trend="up"
          sub={selectedRegion ? `전국 대비` : '14개 시/도'} />
        <KPICard empty={!hasData} label={selectedRegion ? `${selectedRegion} 매출` : "총 매출"}
          value={selectedRegion ? `${selectedRevenue}억` : `${(selectedRevenue/1).toFixed(0)}억`}
          sub={selectedRegion ? '선택 지역' : '전국 합계'} />
        <KPICard empty={!hasData} label="고객당 평균 주문"
          value={selectedRegion ? (1.5 + Math.random()*0.8).toFixed(1) + '건' : "1.8건"}
          change="+0.1" trend="up" sub="재구매율 32%" />
        <KPICard empty={!hasData} label="신규 고객 비율"
          value={selectedRegion ? (60 + Math.random()*15).toFixed(1) + '%' : "68.4%"}
          change="-2.3%" trend="down" sub="재구매 유도 필요" />
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-2">
        <ChartCard empty={!hasData} title="지역별 주문 분포" unit="상위 14개 시/도 (막대 클릭 → 필터)" aiComment="수도권(서울+경기+인천) 집중도가 75%로 높음. 지역 다변화 전략 필요." height={340}>
          <ResponsiveContainer>
            <BarChart data={regionData} layout="vertical" margin={{ left: 0 }}>
              <CartesianGrid strokeDasharray={GRID_DASH} stroke={GRID_STROKE} horizontal={false} />
              <XAxis type="number" tick={AXIS_TICK} tickLine={TICK_LINE} axisLine={AXIS_LINE} />
              <YAxis type="category" dataKey="region" tick={AXIS_TICK} tickLine={TICK_LINE} axisLine={AXIS_LINE} width={50} />
              <Tooltip contentStyle={{ fontSize: 12, borderRadius: 8 }} cursor={{ fill: 'rgba(37,99,235,0.05)' }} />
              <Bar dataKey="주문" radius={BAR_RADIUS_H}
                onClick={(d) => setSelectedRegion(selectedRegion === d.region ? null : d.region)}
                style={{ cursor: 'pointer' }}>
                {regionData.map((r, i) => {
                  const rank = i;
                  // 팀원 B ShopIQ DNA — 피크 3단
                  const bar = rank === 0 ? COLORS.emeraldA : (rank < 3 ? COLORS.cobaltA : (rank < 6 ? 'rgba(28,95,255,0.40)' : COLORS.mutedBar));
                  return (
                    <Cell key={i}
                      fill={selectedRegion === r.region ? COLORS.amberA : bar}
                      opacity={!selectedRegion || selectedRegion === r.region ? 1 : 0.35} />
                  );
                })}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </ChartCard>

        <ChartCard empty={!hasData} title="신규 vs 재구매 추이" unit={selectedRegion ? `${selectedRegion} 지역` : '전국 · 월별'} height={340}>
          <ResponsiveContainer>
            <LineChart data={newVsRepeat}>
              <CartesianGrid strokeDasharray={GRID_DASH} stroke={GRID_STROKE} vertical={false} />
              <XAxis dataKey="month" tick={AXIS_TICK} tickLine={TICK_LINE} axisLine={AXIS_LINE} />
              <YAxis tick={AXIS_TICK} tickLine={TICK_LINE} axisLine={AXIS_LINE} />
              <Tooltip contentStyle={{ fontSize: 12, borderRadius: 8 }} />
              <Legend wrapperStyle={{ fontSize: 11 }} />
              <Line type="monotone" dataKey="신규" stroke={COLORS.cobalt} strokeWidth={2} dot={{ r: 2, strokeWidth: 0, fill: COLORS.cobalt }} activeDot={{ r: 5, stroke: '#fff', strokeWidth: 2 }} />
              <Line type="monotone" dataKey="재구매" stroke={COLORS.emerald} strokeWidth={2} dot={{ r: 2, strokeWidth: 0, fill: COLORS.emerald }} activeDot={{ r: 5, stroke: '#fff', strokeWidth: 2 }} />
            </LineChart>
          </ResponsiveContainer>
        </ChartCard>

        <ChartCard empty={!hasData} title="지역별 매출 비중" unit="상위 8개 (조각 클릭 → 필터)" height={280}>
          <ResponsiveContainer>
            <PieChart>
              <Pie data={regionData.slice(0, 8)} dataKey="매출" nameKey="region" cx="50%" cy="50%"
                innerRadius={58} outerRadius={88} paddingAngle={3}
                label={(e) => e.region}
                onClick={(d) => setSelectedRegion(selectedRegion === d.region ? null : d.region)}
                style={{ cursor: 'pointer' }}>
                {regionData.slice(0, 8).map((r, i) => {
                  // 팀원 B ShopIQ DNA — 5 tier 멀티컬러 (pie/donut)
                  const palette = [COLORS.cobalt, COLORS.emerald, COLORS.amber, COLORS.violet, COLORS.crimson, COLORS.cobaltA, COLORS.emeraldA, COLORS.amberA];
                  return (
                    <Cell key={i}
                      fill={selectedRegion === r.region ? COLORS.amber : palette[i % palette.length]}
                      opacity={!selectedRegion || selectedRegion === r.region ? 1 : 0.3}
                      stroke="#fff"
                      strokeWidth={2} />
                  );
                })}
              </Pie>
              <Tooltip formatter={(v) => fmtKRW(v)} contentStyle={{ fontSize: 12, borderRadius: 8 }} />
            </PieChart>
          </ResponsiveContainer>
        </ChartCard>

        <Card padding="p-0">
          <div className="px-3 py-2 border-b border-gray-100 flex items-center justify-between">
            <span className="text-[13px] font-semibold text-gray-800">
              {selectedRegion ? `${selectedRegion} 세부 도시` : 'TOP 10 도시'}
            </span>
            {selectedRegion && (
              <span className="text-[10px] text-blue-600">{visibleCities.length}개 도시</span>
            )}
          </div>
          {!hasData ? (
            <EmptyState height={260} />
          ) : visibleCities.length === 0 ? (
            <div className="p-6 text-center text-[12px] text-gray-400">{selectedRegion} 지역 세부 도시 데이터 없음</div>
          ) : (
          <table className="w-full text-[12px]">
            <thead className="bg-gray-50 text-gray-600">
              <tr>
                <th className="text-left px-3 py-1.5 font-medium w-8">#</th>
                <th className="text-left px-3 py-1.5 font-medium">도시</th>
                <th className="text-right px-3 py-1.5 font-medium">주문</th>
                <th className="text-right px-3 py-1.5 font-medium">비중</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-gray-100">
              {visibleCities.map((r, i) => (
                <tr key={i} className="hover:bg-gray-50">
                  <td className="px-3 py-1.5 text-gray-400 tnum">{i+1}</td>
                  <td className="px-3 py-1.5 font-medium">{r.city}</td>
                  <td className="px-3 py-1.5 text-right tnum">{fmtNum(r.주문)}</td>
                  <td className="px-3 py-1.5 text-right tnum text-gray-500">{r.pct}%</td>
                </tr>
              ))}
            </tbody>
          </table>
          )}
        </Card>
      </div>
    </div>
  );
}

/* =========================================================
 * 탭 (신규). 고객 분석 (Customer Analytics)
 * 성별/연령/RFM/페르소나/카테고리·시간대 편향/이탈위험
 * ========================================================= */
function CustomerTab() {
  const { hasData, start, end } = useDateRange();
  const { search: globalSearch, consumeSearch } = useSearch();
  const { data: realCustomer } = useRealData('customer');
  const [selectedSegment, setSelectedSegment] = useState(null);
  const [selectedPersona, setSelectedPersona] = useState(null);
  const periodPartial = !isFullRange(start, end);

  // RFM 세그먼트 라벨 → id 매핑
  useEffect(() => {
    const payload = consumeSearch('customer');
    if (payload && payload.kind === 'segment') {
      const map = { 'VIP 고객': 'vip', '충성 고객': 'loyal', '잠재 고객': 'potential', '신규 고객': 'new', '이탈 위험군': 'churn' };
      const id = map[payload.value];
      if (id) setSelectedSegment(id);
    }
  }, [globalSearch]);

  // 실데이터 어댑터
  const genderDist = useMemo(() => {
    if (periodPartial && realCustomer?.by_date?.gender?.length) {
      const filtered = filterByRange(realCustomer.by_date.gender, start, end);
      const agg = aggregateBy(filtered, 'gender', ['count', 'revenue']);
      const total = agg.reduce((s, x) => s + x.count, 0) || 1;
      const colorMap = { '여성': '#F472B6', '남성': '#60A5FA' };
      return agg.map(g => ({
        name: g.gender,
        value: g.count,
        pct: +(g.count / total * 100).toFixed(1),
        color: colorMap[g.gender],
      }));
    }
    if (realCustomer?.gender_distribution?.length) {
      return realCustomer.gender_distribution.map(g => ({
        name: g.name, value: g.value, pct: g.pct, color: g.color
      }));
    }
    return GENDER_DIST;
  }, [realCustomer, start, end, periodPartial]);

  const ageDist = useMemo(() => {
    if (periodPartial && realCustomer?.by_date?.age?.length) {
      const filtered = filterByRange(realCustomer.by_date.age, start, end);
      const agg = aggregateBy(filtered, 'age', ['customers', 'revenue']);
      const order = ['10대','20대','30대','40대','50대','60대+'];
      agg.sort((a, b) => order.indexOf(a.age) - order.indexOf(b.age));
      return agg.map(a => ({ name: a.age, value: a.customers }));
    }
    if (realCustomer?.age_distribution?.length) {
      return realCustomer.age_distribution.map(a => ({
        name: a.age, value: a.customers
      }));
    }
    return AGE_DIST;
  }, [realCustomer, start, end, periodPartial]);

  const ageGenderMatrix = useMemo(() => {
    if (periodPartial && realCustomer?.by_date?.age_gender?.length) {
      const filtered = filterByRange(realCustomer.by_date.age_gender, start, end);
      // 피벗: age × gender
      const byAge = new Map();
      filtered.forEach(r => {
        if (!byAge.has(r.age)) byAge.set(r.age, { age: r.age, 여성: 0, 남성: 0 });
        byAge.get(r.age)[r.gender] = (byAge.get(r.age)[r.gender] || 0) + Number(r.count || 0);
      });
      const order = ['10대','20대','30대','40대','50대','60대+'];
      return Array.from(byAge.values()).sort((a, b) => order.indexOf(a.age) - order.indexOf(b.age));
    }
    if (realCustomer?.age_gender?.length) {
      return realCustomer.age_gender;
    }
    return AGE_GENDER_MATRIX;
  }, [realCustomer, start, end, periodPartial]);

  const totalCustomers = useMemo(() => genderDist.reduce((s, x) => s + x.value, 0), [genderDist]);
  const vipCount = RFM_SEGMENTS.find(s => s.id === 'vip')?.count || 0;
  const churnCount = RFM_SEGMENTS.find(s => s.id === 'churn')?.count || 0;

  return (
    <div className="space-y-3">
      {/* KPI */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
        <KPICard empty={!hasData} label="총 활성 고객"
          value={fmtNum(totalCustomers)} change="+8.3%" trend="up"
          sub="최근 180일 내 구매" />
        <KPICard empty={!hasData} label="VIP 고객"
          value={fmtNum(vipCount)} change="+12%" trend="up"
          sub={`매출 기여 ${RFM_SEGMENTS[0].contribution}%`} />
        <KPICard empty={!hasData} label="신규 (30일)"
          value="3,842" change="+18%" trend="up" sub="첫 구매 완료" />
        <KPICard empty={!hasData} label="이탈 위험군"
          value={fmtNum(churnCount)} change="-4.2%" trend="up"
          sub="180일+ 미구매" />
      </div>

      {/* 성별 / 연령 분포 */}
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-2">
        <ChartCard empty={!hasData} title="성별 분포" unit="활성 고객 기준"
          aiComment="여성 고객 비중 63%로 우세. 뷰티·패션 카테고리 집중도가 높음."
          height={260}>
          <ResponsiveContainer>
            <PieChart>
              <Pie data={genderDist} dataKey="value" nameKey="name"
                cx="50%" cy="50%" innerRadius={58} outerRadius={88} paddingAngle={3}
                label={(e) => `${e.name} ${e.pct}%`}>
                {genderDist.map((g, i) => {
                  // 팀원 B ShopIQ DNA — 5 tier 색상 + 흰색 테두리
                  const genderColor = { '여성': COLORS.crimson, '남성': COLORS.cobalt, '기타': COLORS.violet }[g.name] || g.color || COLORS.cobalt;
                  return <Cell key={i} fill={genderColor} stroke="#fff" strokeWidth={2} />;
                })}
              </Pie>
              <Tooltip formatter={(v) => fmtNum(v) + '명'} contentStyle={{ fontSize: 12, borderRadius: 8 }} />
            </PieChart>
          </ResponsiveContainer>
        </ChartCard>

        <ChartCard empty={!hasData} title="연령대 분포" unit="활성 고객 기준"
          aiComment="30대 고객이 34%로 핵심층. 40대까지 확장 시 객단가 증가 기대."
          height={260}>
          <ResponsiveContainer>
            <BarChart data={ageDist}>
              <CartesianGrid strokeDasharray={GRID_DASH} stroke={GRID_STROKE} vertical={false} />
              <XAxis dataKey="name" tick={AXIS_TICK} tickLine={TICK_LINE} axisLine={AXIS_LINE} />
              <YAxis tick={AXIS_TICK} tickLine={TICK_LINE} axisLine={AXIS_LINE} />
              <Tooltip formatter={(v) => fmtNum(v) + '명'} contentStyle={{ fontSize: 12, borderRadius: 8 }} cursor={{ fill: 'rgba(37,99,235,0.05)' }} />
              <Bar dataKey="value" radius={BAR_RADIUS}>
                {ageDist.map((_, i) => {
                  // 팀원 B ShopIQ DNA — 피크 3단
                  const max = Math.max(...ageDist.map(d => d.value));
                  const isPeak = ageDist[i].value === max;
                  const isHigh = ageDist[i].value > max * 0.7;
                  return <Cell key={i} fill={isPeak ? COLORS.emeraldA : (isHigh ? COLORS.cobaltA : COLORS.mutedBar)} />;
                })}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </ChartCard>

        <ChartCard empty={!hasData} title="연령 × 성별" unit="교차 분석"
          aiComment="30대 여성 21,800명이 최대 세그먼트. 마케팅 우선순위 1위."
          height={260}>
          <ResponsiveContainer>
            <BarChart data={ageGenderMatrix}>
              <CartesianGrid strokeDasharray={GRID_DASH} stroke={GRID_STROKE} vertical={false} />
              <XAxis dataKey="age" tick={AXIS_TICK} tickLine={TICK_LINE} axisLine={AXIS_LINE} />
              <YAxis tick={AXIS_TICK} tickLine={TICK_LINE} axisLine={AXIS_LINE} />
              <Tooltip formatter={(v) => fmtNum(v) + '명'} contentStyle={{ fontSize: 12, borderRadius: 8 }} cursor={{ fill: 'rgba(37,99,235,0.05)' }} />
              <Legend wrapperStyle={{ fontSize: 11 }} />

        <ChartCard empty={!hasData} title="시간대 × 성별" unit="24시간 주문량"

      {/* 카테고리 × 성별 히트맵 */}
      <Card padding="p-3">
        <div className="flex items-center justify-between mb-2">
          <div>
            <span className="text-[13px] font-semibold text-gray-800">카테고리 × 성별 편향</span>
            <span className="text-[11px] text-gray-400 ml-2">· 구매자 성별 비율</span>
          </div>
          <span className="text-[11px] text-gray-500">
            <span className="inline-block w-3 h-3 bg-pink-400 rounded-sm align-middle mr-1"></span>여성
            <span className="inline-block w-3 h-3 bg-blue-400 rounded-sm align-middle ml-2 mr-1"></span>남성

      {/* 이탈 위험 고객 테이블 */}

/* =========================================================
 * 탭 (신규). 마케팅 & 캠페인 (Marketing)
 * 채널 성과 / 캠페인 히스토리 / 퍼널 / 쿠폰
 * ========================================================= */
function MarketingTab() {
  const { hasData, start, end } = useDateRange();
  const { data: realMarketing } = useRealData('marketing');
  const periodPartial = !isFullRange(start, end);

  const totals = useMemo(() => {
    // 부분 기간: marketing.by_date 에서 재집계
    if (periodPartial && realMarketing?.by_date?.length) {
      const filtered = filterByRange(realMarketing.by_date, start, end);
      const spent = filtered.reduce((s, x) => s + (x.spend || 0), 0);
      const revenue = filtered.reduce((s, x) => s + (x.revenue || 0), 0);
      const conv = filtered.reduce((s, x) => s + (x.orders || 0), 0);
      return { spent, revenue, conv,
        roas: spent > 0 ? (revenue / spent).toFixed(2) : 0,
        cac: conv > 0 ? Math.round(spent / conv) : 0 };
    }
    const paid = MARKETING_CHANNELS.filter(c => c.roas !== null);
    const spent = paid.reduce((s, c) => s + c.spent, 0);
    const revenue = paid.reduce((s, c) => s + c.revenue, 0);
    const conv = paid.reduce((s, c) => s + c.conversions, 0);
    return { spent, revenue, conv, roas: spent > 0 ? (revenue / spent).toFixed(2) : 0, cac: conv > 0 ? Math.round(spent / conv) : 0 };
  }, [realMarketing, start, end, periodPartial]);

  const gradeColor = (g) => ({
    best: 'bg-emerald-100 text-emerald-700',
    good: 'bg-blue-50 text-blue-700',
    normal: 'bg-gray-100 text-gray-700',
    watch: 'bg-amber-50 text-amber-700',
    bad: 'bg-rose-50 text-rose-700',
    organic: 'bg-violet-50 text-violet-700'
  }[g] || 'bg-gray-100 text-gray-700');

  const gradeLabel = (g) => ({ best: 'BEST', good: 'GOOD', normal: '평균', watch: '주의', bad: '중단검토', organic: '자연' }[g] || g);

  return (
    <div className="space-y-3">
      {/* KPI */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
        <KPICard empty={!hasData} label="광고비 집행"
          value={'₩' + (totals.spent / 1000000).toFixed(1) + 'M'}
          change="+4.2%" trend="down" sub="이번 달 누적" />
        <KPICard empty={!hasData} label="광고 매출"
          value={'₩' + (totals.revenue / 1000000).toFixed(1) + 'M'}
          change="+18.6%" trend="up" sub="ROAS 기준" />
        <KPICard empty={!hasData} label="전체 ROAS"
          value={totals.roas + 'x'} change="+0.8" trend="up" sub="목표 4.5x" />
        <KPICard empty={!hasData} label="CAC (획득비용)"
          value={'₩' + fmtNum(totals.cac)} change="-6.4%" trend="up" sub="신규 1인당" />
      </div>

      {/* 채널별 성과 카드 */}
      <Card padding="p-3">
        <div className="flex items-center justify-between mb-2">
          <div>
            <span className="text-[13px] font-semibold text-gray-800">채널별 성과</span>
            <span className="text-[11px] text-gray-400 ml-2">· SNS 중심</span>
          </div>
          <span className="text-[11px] text-gray-500">이번 달 누적</span>
        </div>
        {!hasData ? <EmptyState height={240} /> : (
          <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
            {MARKETING_CHANNELS.map((c, i) => (
              <div key={i} className="border border-gray-200 rounded-lg p-2.5 hover:shadow-md transition-shadow">
                <div className="flex items-center justify-between mb-1.5">
                  <div className="flex items-center gap-1.5">
                    <span className="text-lg">{c.icon}</span>
                    <span className="text-[12px] font-semibold text-gray-900">{c.channel}</span>
                  </div>
                  <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded ${gradeColor(c.grade)}`}>{gradeLabel(c.grade)}</span>
                </div>
                <div className="flex items-baseline gap-1 mb-0.5">
                  <span className="text-[18px] font-bold tnum text-gray-900">{c.roas !== null ? c.roas + 'x' : '—'}</span>
                  <span className="text-[10px] text-gray-500">ROAS</span>
                </div>
                <div className="text-[10px] text-gray-500 tnum">매출 ₩{(c.revenue/1000000).toFixed(1)}M</div>
                <div className="text-[10px] text-gray-400 tnum">지출 ₩{(c.spent/1000000).toFixed(1)}M · {fmtNum(c.conversions)}건</div>
                <div className="mt-1.5 h-1 bg-gray-100 rounded-full overflow-hidden">
                  <div className="h-full" style={{ width: Math.min(100, (c.roas || 0) * 12) + '%', backgroundColor: c.grade === 'best' ? '#10B981' : c.grade === 'bad' ? '#EF4444' : '#2563EB' }} />
                </div>
              </div>
            ))}
          </div>
        )}
      </Card>

      {/* 퍼널 + 캠페인 히스토리 */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-2">
        <ChartCard empty={!hasData} title="유입 → 전환 퍼널"
          unit="이번 달"
          aiComment="장바구니→결제 구간 이탈이 56%. 결제 단계 UX 개선 시 월 매출 +8% 추정."
          height={340}>
          <div className="space-y-2 w-full">
            {FUNNEL_DATA.map((f, i) => {
              const drop = i > 0 ? ((FUNNEL_DATA[i-1].count - f.count) / FUNNEL_DATA[i-1].count * 100).toFixed(1) : null;
              return (
                <div key={i}>
                  <div className="flex items-center justify-between text-[11px] mb-0.5">
                    <span className="font-medium text-gray-700">{f.stage}</span>
                    <span className="tnum text-gray-500">{fmtNum(f.count)}명 · {f.pct}%</span>
                  </div>
                  <div className="h-6 bg-gray-100 rounded overflow-hidden relative">
                    <div className="h-full flex items-center justify-end pr-2 text-white text-[10px] font-semibold"
                      style={{ width: f.pct + '%', background: `linear-gradient(90deg, #2563EB ${100-i*12}%, #60A5FA)` }}>
                      {f.pct >= 10 ? f.pct + '%' : ''}
                    </div>
                  </div>
                  {drop && (
                    <div className="text-[10px] text-rose-500 mt-0.5 text-right">↓ 이탈 {drop}%</div>
                  )}
                </div>
              );
            })}
          </div>
        </ChartCard>

        <Card padding="p-0">
          <div className="flex items-center justify-between px-3 py-2 border-b border-gray-100">
            <span className="text-[13px] font-semibold text-gray-800">캠페인 히스토리</span>
            <button className="text-[12px] bg-blue-600 hover:bg-blue-700 text-white px-2.5 py-1 rounded">+ 새 캠페인</button>

}

    if (realDelivery?.days_vs_rating?.length) {
      return realDelivery.days_vs_rating.map(r => ({
        배송일: r.days,

    if (periodPartial && realDelivery?.review_by_date?.length) {
      const filtered = filterByRange(realDelivery.review_by_date, start, end);
      const agg = aggregateBy(filtered, 'score', ['count']);
      agg.sort((a, b) => a.score - b.score);
      return agg.map(r => ({
        star: `${r.score}★`,
        count: r.count,
      }));
    }
    if (realDelivery?.review_score_distribution?.length) {

/* =========================================================

 * uvicorn main:app --port 8000  으로 기동
 * ========================================================= */
const BACKEND_CONFIG = {
  baseUrl: 'http://127.0.0.1:8000',
  timeoutMs: 15000
};

// 범용 fetch 헬퍼 (타임아웃 + JSON 파싱 + 에러 표준화)
async function apiFetch(path, opts = {}) {
  const ctrl = new AbortController();
  const tid = setTimeout(() => ctrl.abort(), BACKEND_CONFIG.timeoutMs);
  try {
    const res = await fetch(BACKEND_CONFIG.baseUrl + path, {
      ...opts,
      signal: ctrl.signal,
      headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) }
    });
    clearTimeout(tid);
    if (!res.ok) return { ok: false, status: res.status };
    return await res.json();
  } catch (e) {
    clearTimeout(tid);
    return { ok: false, error: e.message || 'network error' };
  }
}

// React hook — 탭 마운트 시 API 자동 fetch
function useBackend(path, enabled = true) {
  const [state, setState] = React.useState({ loading: enabled, data: null, error: null });
  React.useEffect(() => {
    if (!enabled) return;
    let alive = true;
    setState({ loading: true, data: null, error: null });
    apiFetch(path).then(res => {
      if (!alive) return;
      if (res && res.ok) setState({ loading: false, data: res, error: null });
      else setState({ loading: false, data: null, error: res?.error || 'fetch failed' });
    });
    return () => { alive = false; };
  }, [path, enabled]);
  return state;
}

// LM Studio / OpenAI 호환 API 호출
// 백엔드 /api/summary 를 실시간 fetch → System Prompt 에 ML 결과 주입
async function buildLiveSystemPrompt() {
  const summary = await apiFetch('/api/summary');
  if (!summary || !summary.ok) return LLM_SYSTEM_PROMPT;

  let liveBlock = '\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
  liveBlock += '■ 11. 실시간 ML/DL 모델 산출물 (ShopIQ Backend · FastAPI)\n';
  liveBlock += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
  liveBlock += `갱신 시각: ${summary.timestamp}\n\n`;

  if (summary.forecast) {
    liveBlock += `[매출 예측] ${summary.forecast.algorithm}\n`;
    liveBlock += `- MAPE ${summary.forecast.mape}%\n`;
    liveBlock += `- 다음 3개월: ${summary.forecast.next_3m.join(', ')} (95% CI lo=${summary.forecast.lo.join(',')} / hi=${summary.forecast.hi.join(',')})\n\n`;
  }
  if (summary.segment) {
    liveBlock += `[고객 세분화] ${summary.segment.algorithm}\n`;
    liveBlock += `- Silhouette ${summary.segment.silhouette}\n`;
    liveBlock += `- 세그먼트 고객수: ${JSON.stringify(summary.segment.counts)}\n\n`;
  }
  if (summary.anomaly) {
    liveBlock += `[이상 탐지] ${summary.anomaly.algorithm}\n`;
    const evs = (summary.anomaly.recent_events || []).slice(0, 3);
    evs.forEach(e => { liveBlock += `- ${e.date} ${e.metric} ${e.type} (z=${e.z_score}, 관측=${e.value}, 기대=${e.expected})\n`; });
    liveBlock += '\n';
  }
  if (summary.inventory) {
    liveBlock += `[재고·공급망] ${summary.inventory.algorithm}\n`;
    (summary.inventory.critical || []).slice(0, 3).forEach(c => {
      liveBlock += `- ⚠ ${c.sku} ${c.name} · ${c.days_left}일 남음 · 추천 발주 ${c.suggest}\n`;
    });
    liveBlock += '\n';
  }
  if (summary.review) {
    liveBlock += `[리뷰·신뢰] ${summary.review.algorithm}\n`;
    liveBlock += `- 가짜 리뷰 탐지율 ${summary.review.flagged_pct}% (총 ${summary.review.total}건)\n\n`;
  }
  if (summary.search) {
    liveBlock += `[검색·키워드 ROAS 모델] ${summary.search.algorithm} · R²=${summary.search.r2}\n\n`;
  }
  if (summary.marketing) {
    liveBlock += `[마케팅] ${summary.marketing.algorithms.join(' + ')}\n`;
    liveBlock += `- 평균 Uplift ${summary.marketing.uplift_mean}\n`;
    liveBlock += `- 채널 기여도(%): ${JSON.stringify(summary.marketing.attribution)}\n`;
  }

  return LLM_SYSTEM_PROMPT + liveBlock;
}

async function callLLM(userMsg, history = []) {
  // baseUrl 에 /v1 이 이미 포함돼 있으면 중복 방지
  const base = LLM_CONFIG.baseUrl.replace(/\/$/, '');
  const url = base.endsWith('/v1')
    ? `${base}/chat/completions`
    : `${base}/v1/chat/completions`;
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), LLM_CONFIG.timeoutMs);

  const headers = { 'Content-Type': 'application/json' };
  if (LLM_CONFIG.apiKey) headers['Authorization'] = `Bearer ${LLM_CONFIG.apiKey}`;

  // 백엔드 실시간 ML 결과 주입
  const liveSystem = await buildLiveSystemPrompt();

  try {
    const res = await fetch(url, {
      method: 'POST',
      headers,
      signal: controller.signal,
      body: JSON.stringify({
        model: LLM_CONFIG.model,
        messages: [
          { role: 'system', content: liveSystem },
          ...history.slice(-6).map(m => ({ role: m.role === 'ai' ? 'assistant' : 'user', content: m.text || '' })),
          { role: 'user', content: userMsg }
        ],
        temperature: LLM_CONFIG.temperature,
        max_tokens: LLM_CONFIG.maxTokens,
        stream: false
      })
    });
    clearTimeout(timeoutId);
    if (!res.ok) throw new Error(`LLM ${res.status}`);
    const data = await res.json();
    const content = data.choices?.[0]?.message?.content || '';
    return { ok: true, content };
  } catch (err) {
    clearTimeout(timeoutId);
    return { ok: false, error: err.message || 'LLM 요청 실패' };
  }
}

// LLM 응답에서 차트 JSON 블록 파싱
function parseLLMResponse(content) {
  const chartMatch = content.match(/```chart\s*\n?([\s\S]*?)```/);
  let text = content.replace(/```chart[\s\S]*?```/g, '').trim();
  let chart = null;
  if (chartMatch) {
    try {
      chart = JSON.parse(chartMatch[1].trim());
    } catch (e) {
      console.warn('chart JSON parse failed', e);
    }
  }
  return { text, chart };
}

// 마크다운 굵게 (**text**) 파서 — 팀원 A 이식
function MDBold({ text }) {
  if (!text) return null;
  const parts = String(text).split(/(\*\*[^*]+\*\*)/g);
  return (
    <>
      {parts.map((p, i) => {
        if (p.startsWith('**') && p.endsWith('**')) {
          return <strong key={i} className="font-bold">{p.slice(2, -2)}</strong>;
        }
        return <React.Fragment key={i}>{p}</React.Fragment>;
      })}
    </>
  );
}

  const findReply = (text) => {
    const lower = text.toLowerCase();
    for (const pat of REPLY_PATTERNS) {
      const matched = pat.keywords.filter(k => lower.includes(k.toLowerCase())).length;
      if (matched >= Math.min(2, pat.keywords.length)) {
        return pat.reply;
      }
    }
    // 단일 키워드라도 매칭되면 그 응답 사용
    for (const pat of REPLY_PATTERNS) {
      if (pat.keywords.some(k => lower.includes(k.toLowerCase()))) {
        return pat.reply;
      }
    }
    return {
      text: `"${text}"에 대해 답드릴 만한 데이터를 찾아봤지만, 구체적인 수치를 매칭하지 못했어요. 아래 추천 질문을 활용하거나 키워드(예: 매출, 반품, 부산, 재고, 신규 등)를 포함해 다시 질문해 주세요.`,
      note: '프로토타입 모드 — 실제 서비스에서는 Claude API가 SQL/분석 쿼리를 자동 생성합니다.'
    };

    if (!text.trim() || typing) return;
    const userMsg = { role: 'user', text };
    const history = messages.slice(-8);
    setMessages(prev => [...prev, userMsg]);
    setInput('');
    setTyping(true);
    setLlmStatus('connecting');

    // 1) LM Studio (팀원 A 서버) 먼저 시도
    const llmResult = await callLLM(text, history);

    if (llmResult.ok && llmResult.content) {
      // LLM 성공 — 응답 파싱 (차트 JSON 추출)
      const { text: answerText, chart } = parseLLMResponse(llmResult.content);
      const aiMsg = {
        role: 'ai',
        text: answerText,
        source: 'llm'
      };
      if (chart && chart.data && Array.isArray(chart.data)) {
        aiMsg.chartType = chart.chartType || 'bar';
        aiMsg.chartTitle = chart.title || '';
        aiMsg.data = chart.data;
      }
      setMessages(prev => [...prev, aiMsg]);
      setLlmStatus('live');
    } else {
      // 2) 폴백 — 기존 하드코딩 패턴 응답
      const reply = findReply(text);
      setMessages(prev => [...prev, {
        role: 'ai',
        ...reply,
        source: 'fallback',
        fallbackReason: llmResult.error
      }]);
      setLlmStatus('fallback');
    }
    setTyping(false);
  };

                  <span className="text-[11px] text-gray-500">AI가 데이터를 분석하고 있습니다…</span>
                </div>
              </div>
            </div>
          )}

          <div ref={endRef} />
        </div>
      </div>

      {/* 입력 영역 — 고정 바닥 (팀원 A 스타일) */}
      <div className="px-4 sm:px-8 py-4 bg-[#F7F8FB] border-t border-gray-200 flex-shrink-0">
        <div className="max-w-3xl mx-auto">
          {/* 추천 질문 */}

            <div className="text-[10px] font-bold uppercase tracking-wide text-gray-500 mb-2">추천 질문</div>
            <div className="flex flex-wrap gap-1.5">
              {SUGGESTIONS.map((q, i) => (
                <button key={i} onClick={() => send(q)}
                  className="px-2.5 py-1 bg-white border border-gray-200 text-[11px] text-gray-700 rounded-lg hover:border-violet-300 hover:bg-violet-50 transition-colors"
                >
                  {q}
                </button>
              ))}
            </div>
          </div>

          {/* 입력창 */}
          <div className="relative">
            <input
              type="text"
              placeholder="무엇이든 물어보세요… (예: 4월 매출 예측, 반품률 분석, VIP 캠페인 기획)"
              value={input}
              onChange={(e) => setInput(e.target.value)}
              onKeyDown={(e) => e.key === 'Enter' && send(input)}
              disabled={typing}
              className="w-full h-12 pl-4 pr-14 rounded-xl border border-gray-200 text-[13px] focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent bg-white disabled:bg-gray-50"
            />
            <button
              onClick={() => send(input)}
              disabled={typing || !input.trim()}
              className="absolute right-2 top-1/2 -translate-y-1/2 w-9 h-9 rounded-lg flex items-center justify-center transition-all disabled:opacity-40"
              style={{ background: 'linear-gradient(135deg, #8B5CF6, #6D28D9)' }}
            >
              <Icon name="send" className="w-4 h-4 text-white" />
            </button>
          </div>

          <p className="text-[10px] text-gray-400 mt-2 text-center">
            {llmStatus === 'live' ? (
              <>🟢 로컬 <strong className="font-semibold">Gemma</strong> 모델({LLM_CONFIG.model}) — LM Studio 서버 경유</>
            ) : llmStatus === 'fallback' ? (
              <>⚠ LLM 서버 연결 실패 · 로컬 패턴 응답으로 폴백 중 ({LLM_CONFIG.baseUrl})</>
            ) : (
              <>🔌 LM Studio (Gemma) 서버에 연결 대기 중 · 질문을 보내면 자동 연결됩니다</>
            )}
          </p>
        </div>
      </div>
    </div>
  );
}

];

function LoginScreen({ onLogin }) {
  const [id, setId] = useState('');
  const [pw, setPw] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const submit = (e) => {
    e.preventDefault();
    setError('');
    const account = TEST_ACCOUNTS.find(a => a.id === id.trim() && a.pw === pw);
    if (!account) {
      setError('아이디 또는 비밀번호가 올바르지 않습니다.');
      return;
    }
    setLoading(true);
    // 살짝의 로딩감을 위해 setTimeout (프로토타입용)
    setTimeout(() => { onLogin(account); }, 400);
  };

  const fillTestAccount = (acc) => {
    setId(acc.id);
    setPw(acc.pw);
    setError('');
  };

  return (
    <div className="min-h-full w-full flex items-center justify-center bg-gradient-to-br from-blue-50 via-white to-indigo-50 px-4 py-8">

          <div>
            <div className="font-bold text-[20px] text-gray-900 leading-none">K-MALL</div>
            <div className="text-[11px] text-gray-400 mt-0.5">Analytics Dashboard</div>
          </div>
        </div>

        {/* 카드 */}
        <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-6 sm:p-8">
          <h1 className="text-[18px] sm:text-[20px] font-bold text-gray-900 mb-1">로그인</h1>
          <p className="text-[12.5px] text-gray-500 mb-5">K-MALL 대시보드에 오신 것을 환영합니다.</p>

          <form onSubmit={submit} className="space-y-3">
            <div>
              <label className="block text-[12px] font-medium text-gray-700 mb-1">아이디</label>
              <input
                type="text"
                value={id}
                onChange={(e) => setId(e.target.value)}
                placeholder="아이디를 입력하세요"
                autoComplete="username"
                className="w-full h-11 px-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none text-[14px] transition"
              />

            <div>
              <label className="block text-[12px] font-medium text-gray-700 mb-1">비밀번호</label>

                value={pw}
                onChange={(e) => setPw(e.target.value)}
                placeholder="비밀번호를 입력하세요"

              />
            </div>

            {error && (
              <div className="flex items-center gap-1.5 text-[12px] text-rose-600 bg-rose-50 border border-rose-100 rounded-lg px-3 py-2">
                <Icon name="alert" className="w-3.5 h-3.5" />
                <span>{error}</span>
              </div>
            )}

            <button
              type="submit"
              disabled={loading}
              className="w-full h-11 rounded-lg bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white text-[14px] font-semibold transition flex items-center justify-center gap-1.5"
            >
              {loading ? (
                <>
                  <span className="w-3.5 h-3.5 border-2 border-white/40 border-t-white rounded-full animate-spin" />
                  로그인 중...
                </>
              ) : '로그인'}
            </button>
          </form>

          {/* 테스트 계정 안내 */}
          <div className="mt-5 pt-5 border-t border-gray-100">
            <div className="flex items-center gap-1 text-[11px] font-semibold text-gray-500 mb-2">
              <Icon name="info" className="w-3 h-3" />
              <span>테스트 계정 (프로토타입)</span>
            </div>
            <div className="space-y-1.5">
              {TEST_ACCOUNTS.map((a) => (
                <button
                  key={a.id}
                  type="button"
                  onClick={() => fillTestAccount(a)}
                  className="w-full flex items-center justify-between px-3 py-2 rounded-lg bg-gray-50 hover:bg-blue-50 border border-gray-100 hover:border-blue-200 text-left transition"
                >
                  <div>
                    <div className="text-[12.5px] font-medium text-gray-800">{a.label}</div>
                    <div className="text-[11px] text-gray-500 tnum">ID: {a.id} · PW: {a.pw}</div>
                  </div>
                  <span className="text-[11px] text-blue-600 font-medium">자동입력</span>
                </button>
              ))}
            </div>
          </div>
        </div>

        <p className="text-center text-[11px] text-gray-400 mt-4">
          © 2026 K-MALL. 프로토타입 버전.
        </p>
      </div>
    </div>
  );
}

/* =========================================================
 * 메인 앱
 * ========================================================= */
function App() {
  // localStorage 에 사용자 세션 저장 → 새로고침/탭 재방문 시 로그인 유지
  const STORAGE_KEY = 'kmall_user';
  const [user, setUser] = useState(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (_) {
      return null;
    }
  });

  const handleLogin = (account) => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(account)); } catch (_) {}
    setUser(account);
  };
  const handleLogout = () => {
    try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
    setUser(null);
  };

  if (!user) {
    return <LoginScreen onLogin={handleLogin} />;
  }

  return (
    <RealDataProvider>
      <DateRangeProvider>
        <SearchProvider>
          <Dashboard user={user} onLogout={handleLogout} />
        </SearchProvider>
      </DateRangeProvider>
    </RealDataProvider>
  );
}

function Dashboard({ user, onLogout }) {
  const [activeTab, setActiveTab] = useState('sales');
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [mobileNavOpen, setMobileNavOpen] = useState(false);
  const { rangeSummary, granularity } = useDateRange();

  const renderTab = () => {
    switch (activeTab) {
      case 'orders': return <OrdersTab />;
      case 'sales': return <SalesTab />;
      case 'product': return <ProductTab />;
      case 'region': return <RegionTab />;
      case 'customer': return <CustomerTab />;
      case 'marketing': return <MarketingTab />;
      case 'search': return <SearchTab />;
      case 'inventory': return <InventoryTab />;
      case 'delivery': return <DeliveryTab />;
      case 'chatbot': return <ChatbotTab />;
      case 'copilot': return <CopilotTab />;
      case 'insights': return <InsightsTab />;
      default: return null;
    }
  };

  const activeTabInfo = TABS.find(t => t.id === activeTab);

  const handleTabChange = (id) => {
    setActiveTab(id);
    setMobileNavOpen(false);
  };

  return (
    <div className="h-full flex">
      {/* 데스크톱 사이드바 — full height (TopBar 위까지) */}
      <div className="hide-mobile h-full">
        <Sidebar
          active={activeTab}
          onChange={handleTabChange}
          collapsed={sidebarCollapsed}
          onToggleCollapsed={() => setSidebarCollapsed(v => !v)}
        />
      </div>

      {/* 모바일 사이드바 드로어 */}
      {mobileNavOpen && (
        <div className="only-mobile fixed inset-0 z-40">
          <div
            className="absolute inset-0 bg-black/40"
            onClick={() => setMobileNavOpen(false)}
          />
          <div className="absolute left-0 top-0 bottom-0 shadow-xl">
            <Sidebar
              active={activeTab}
              onChange={handleTabChange}
              isMobile
              onClose={() => setMobileNavOpen(false)}
            />
          </div>
        </div>
      )}

      {/* 우측 컬럼: TopBar + Main (사이드바 오른쪽에만) */}
      <div className="flex-1 flex flex-col overflow-hidden relative">
        <TopBar
          active={activeTab}
          onChange={handleTabChange}
          user={user}
          onLogout={onLogout}
          mobileNavOpen={mobileNavOpen}
          setMobileNavOpen={setMobileNavOpen}
          onGotoCopilot={() => setActiveTab('copilot')}
        />

        <main className="flex-1 overflow-auto scroll-thin p-6 sm:p-8" style={{background:'var(--bg-soft)'}}>
          <div className="mb-6 flex items-end justify-between gap-3">
            <div className="min-w-0">
              <h1 className="heading-h1 truncate">{activeTabInfo?.label}</h1>
              <p className="text-[13px] mt-1 truncate" style={{color:'var(--text-3)'}}>
                {activeTab === 'chatbot' ? '자연어로 질문하고 실시간 답변을 받으세요'
                  : activeTab === 'insights' ? 'AI가 자동 생성한 분석 리포트'
                  : activeTab === 'copilot' ? '오늘 뭘 할지 AI가 추천해줘요'
                  : `${GRANULARITY_LABELS[granularity]} · ${rangeSummary}`}
              </p>
            </div>
            <div className="flex items-center gap-2">
              {/* 모바일 전용 기간 필터 */}
              {activeTab !== 'chatbot' && activeTab !== 'insights' && activeTab !== 'copilot' && (
                <div className="only-mobile">
                  <DateRangeControl />
                </div>
              )}
            </div>
          </div>
          <div className={activeTab === 'chatbot' ? 'h-[calc(100%-80px)]' : ''}>
            {renderTab()}
          </div>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
