<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>K-MALL Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  // Tailwind config — Lucid Commerce 디자인 토큰 확장
  if (window.tailwind) {
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: {
              900: '#0F172A',
              800: '#111827',
              700: '#374151',
              600: '#4B5563',
              500: '#6B7280',
              100: '#E5E7EB',
              50:  '#F3F4F6',
              25:  '#F7F8FB',
            },
            brand: {
              700: '#1D4ED8',
              600: '#2563EB',
              500: '#60A5FA',
              50:  '#EFF6FF',
            },
          },
          borderRadius: {
            'card': '12px',
            'chip': '8px',
            'pill': '10px',
          },
          boxShadow: {
            'card': '0 1px 3px rgba(17,24,39,0.04), 0 1px 2px rgba(17,24,39,0.02)',
            'card-hover': '0 10px 25px -8px rgba(17,24,39,0.10), 0 4px 10px -4px rgba(17,24,39,0.05)',
            'brand': '0 10px 15px -3px rgba(37,99,235,0.25), 0 4px 6px -4px rgba(37,99,235,0.2)',
            'ai': '0 10px 15px -3px rgba(139,92,246,0.25), 0 4px 6px -4px rgba(139,92,246,0.2)',
          },
          fontFamily: {
            sans:    ['Pretendard Variable', 'Pretendard', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'Roboto', 'Helvetica Neue', 'Segoe UI', 'sans-serif'],
            display: ['Pretendard Variable', 'Pretendard', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  }
</script>
<!-- IBM Plex Mono: 팀원 B ShopIQ 그래프 DNA — 축 틱·KPI 숫자 전용 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- CDN fallback (jsDelivr): 일부 네트워크 환경에서 unpkg 차단 시 대비 -->
<script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    /* K-MALL × Lucid Architect 시안 + Figma Make 차트 톤 */
    --bg: #FFFFFF;
    --bg-soft: #F1F4F8;       /* Lucid Architect 본문 배경 (살짝 푸른 회색) */
    --bg-tint: #E8ECF2;
    --border: #E5E7EB;        /* gray-200 */
    --border-strong: #D1D5DB; /* gray-300 */
    --text-1: #111827;        /* gray-900 — 본문 */
    --text-2: #374151;        /* gray-700 — 서브 */
    --text-3: #6B7280;        /* gray-500 — 뮤티드 */
    --text-4: #9CA3AF;        /* gray-400 — 캡션 */
    --heading: #0F172A;       /* slate-900 */
    --accent: #2563EB;        /* Make blue-600 */
    --accent-deep: #1D4ED8;   /* blue-700 */
    --accent-soft: #60A5FA;   /* blue-400 */
    --accent-bg: #EFF6FF;     /* blue-50 */
    --success: #059669;       /* emerald-600 */
    --success-deep: #047857;  /* emerald-700 */
    --success-bg: #ECFDF5;    /* emerald-50 */
    --danger: #DC2626;        /* red-600 */
    --danger-deep: #B91C1C;   /* red-700 */
    --danger-bg: #FEF2F2;     /* red-50 */
    --warning: #D97706;       /* amber-600 */
    --ai: #8B5CF6;            /* violet-500 — AI 시그니처 유지 */
    --ai-deep: #7C3AED;       /* violet-600 */
    --ai-bg: #F5F3FF;         /* violet-50 */
    --ai-border: #DDD6FE;     /* violet-200 */
    /* Make 카드 섀도우: 0 1px 3px rgba(17,24,39,0.04) — 가볍고 모던 */
    --card-shadow: 0 1px 3px rgba(17,24,39,0.04), 0 1px 2px rgba(17,24,39,0.02);
    --card-shadow-hover: 0 10px 25px -8px rgba(17,24,39,0.10), 0 4px 10px -4px rgba(17,24,39,0.05);
    --brand-shadow: 0 10px 15px -3px rgba(37,99,235,0.25), 0 4px 6px -4px rgba(37,99,235,0.2);
    --ai-shadow: 0 10px 15px -3px rgba(139,92,246,0.25), 0 4px 6px -4px rgba(139,92,246,0.2);
    --radius-card: 12px;      /* rounded-xl */
    --radius-chip: 10px;

    /* ═══════════════════════════════════════════════
       팀원 B "ShopIQ" 5 Tier 팔레트 — 차트 전용
       (본문 톤은 유지, 그래프 DNA만 흡수)
    ═══════════════════════════════════════════════ */
    --tier-cobalt:    #1C5FFF;   /* 주색 (파랑) */
    --tier-cobalt-l:  rgba(28, 95, 255, 0.10);
    --tier-cobalt-a:  rgba(28, 95, 255, 0.65);   /* 바 alpha */
    --tier-emerald:   #00A878;   /* 긍정/성장 */
    --tier-emerald-l: rgba(0, 168, 120, 0.10);
    --tier-emerald-a: rgba(0, 168, 120, 0.70);
    --tier-amber:     #D4830A;   /* 주의 */
    --tier-amber-l:   rgba(212, 131, 10, 0.10);
    --tier-amber-a:   rgba(212, 131, 10, 0.70);
    --tier-crimson:   #D93025;   /* 위험 */
    --tier-crimson-l: rgba(217, 48, 37, 0.10);
    --tier-crimson-a: rgba(217, 48, 37, 0.70);
    --tier-violet:    #7C3AED;   /* AI/예측 */
    --tier-violet-l:  rgba(124, 58, 237, 0.10);
    --tier-violet-a:  rgba(124, 58, 237, 0.65);
    --tier-grid:      #EEF1F5;   /* 차트 그리드 — 부드러운 톤 */
    --tier-muted:     #AEAEB2;   /* 회색 계열 바 */
  }
  html, body, #root { height: 100%; }
  html, body, button, input, select, textarea {
    font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', sans-serif;
  }
  body {
    color: var(--text-1);
    background: var(--bg-soft);
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "tnum", "ss01";
    letter-spacing: -0.01em;
    text-rendering: optimizeLegibility;
  }
  /* Recharts SVG 텍스트 — 기본 Pretendard */
  svg text, .recharts-text, .recharts-legend-item-text, .recharts-tooltip-item {
    font-family: 'Pretendard Variable', Pretendard, system-ui, sans-serif !important;
  }
  /* ═══ 팀원 B ShopIQ DNA: 축 틱·숫자 라벨은 IBM Plex Mono ═══ */
  .recharts-cartesian-axis-tick-value,
  .recharts-cartesian-axis-tick text,
  .mono, .num-mono {
    font-family: 'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace !important;
    font-feature-settings: "tnum";
  }
  /* 숫자에는 한글 폰트 특유의 가로폭 튐 방지 위해 tabular-nums 고정 */
  .tnum { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
  /* 모노스페이스 섹션 라벨: 작고 wide tracking + uppercase */
  .mono-label {
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-size: 10px; letter-spacing: 0.14em;
    color: var(--text-3); text-transform: uppercase;
    font-weight: 500;
  }
  .mono-delta {
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-size: 11px; font-weight: 600;
    padding: 2px 7px; border-radius: 4px;
  }
  /* Make 스타일 숫자 타이포 — 크기 ↓, weight 700으로 정돈 */
  .num-hero { font-size: 36px; font-weight: 700; letter-spacing: -0.025em; color: var(--text-1); line-height: 1.1; }
  .num-xl   { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; color: var(--text-1); line-height: 1.15; }
  .num-lg   { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; color: var(--text-1); }
  /* KPI 라벨: Make 스타일 — 11px uppercase gray-500 */
  .label-kpi {
    font-size: 11px; font-weight: 600; color: var(--text-3);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .heading-h4 { font-size: 15px; font-weight: 600; color: var(--text-1); letter-spacing: -0.01em; }
  .heading-section { font-size: 19px; font-weight: 600; color: var(--text-1); letter-spacing: -0.01em; }
  .heading-h1 { font-size: 28px; font-weight: 600; color: var(--heading); letter-spacing: -0.02em; line-height: 1.25; }
  /* Make 기본 카드: rounded-xl + 얕은 shadow + hover lift */
  .card-lc {
    background: var(--bg); border-radius: var(--radius-card);
    box-shadow: var(--card-shadow);
    border: 1px solid rgba(229,231,235,0.6);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .card-lc:hover { box-shadow: var(--card-shadow-hover); }
  .chip-success { background: var(--success-bg); color: var(--success-deep); }
  .chip-danger  { background: var(--danger-bg);  color: var(--danger-deep); }
  .chip-brand   { background: var(--accent-bg);  color: var(--accent); }
  .chip-ai      { background: var(--ai-bg);      color: var(--ai-deep); }
  .chip-up, .chip-down {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 7px; border-radius: 4px;
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-size: 11px; font-weight: 600;
  }
  /* 팀원 B ShopIQ 델타: 연한 tier 배경 + 진한 tier 텍스트 */
  .chip-up   { background: var(--tier-emerald-l); color: var(--tier-emerald); }
  .chip-down { background: var(--tier-crimson-l); color: var(--tier-crimson); }

  /* Make AI Insight 배너 — 바이올렛 그라데이션 보더 */
  .ai-banner {
    background: linear-gradient(135deg, rgba(139,92,246,0.06) 0%, rgba(139,92,246,0.02) 100%);
    border: 1px solid var(--ai-border);
    border-radius: var(--radius-card);
  }
  .ai-insight-quote {
    background: linear-gradient(to right, rgba(139,92,246,0.05), rgba(139,92,246,0));
    border-left: 3px solid var(--ai);
    border-radius: 8px;
  }

  /* Make 활성 메뉴 좌측 바 인디케이터 */
  .menu-active-bar {
    position: absolute; left: 0; top: 50%;
    transform: translateY(-50%);
    width: 3px; height: 20px; border-radius: 0 2px 2px 0;
  }
  .menu-active-bar.ai    { background: var(--ai-deep); }
  .menu-active-bar.brand { background: var(--accent); }

  /* Chart 라인/그리드 통일 (Make 톤) */
  .recharts-cartesian-grid-horizontal line,
  .recharts-cartesian-grid-vertical line { stroke: #F3F4F6 !important; stroke-dasharray: 3 3 !important; }
  .recharts-cartesian-axis-line { stroke: transparent !important; }
  .recharts-cartesian-axis-tick line { stroke: transparent !important; }
  .recharts-cartesian-axis-tick text { fill: #9CA3AF !important; font-size: 11px !important; font-weight: 500 !important; }
  /* 라인 차트 데이터 포인트는 기본 숨김 (hover 시 activeDot만) */
  .recharts-line .recharts-line-dots circle { display: none; }
  .recharts-line .recharts-line-active-dot circle { stroke-width: 2; stroke: #fff; }
  /* 바 차트: 호버 시 투명도 오버레이 제거 (Make는 깔끔하게) */
  .recharts-bar-rectangles .recharts-bar-rectangle:hover path { opacity: 0.85; }
  /* 툴팁 기본 스타일 덮어쓰기 */
  .recharts-default-tooltip {
    background: rgba(17,24,39,0.92) !important;
    border: none !important;
    border-radius: 8px !important;
    padding: 8px 12px !important;
    box-shadow: 0 6px 18px -6px rgba(17,24,39,0.25) !important;
  }
  .recharts-tooltip-label { color: rgba(255,255,255,0.7) !important; font-size: 11px !important; margin-bottom: 2px !important; }
  .recharts-tooltip-item  { color: #fff !important; font-size: 13px !important; font-weight: 600 !important; }
  .recharts-tooltip-item-name,
  .recharts-tooltip-item-separator { color: rgba(255,255,255,0.7) !important; }
  /* 범례 텍스트 */
  .recharts-legend-item-text { font-size: 12px !important; color: #6B7280 !important; }
  .scroll-thin::-webkit-scrollbar { width: 8px; height: 8px; }
  .scroll-thin::-webkit-scrollbar-track { background: transparent; }
  .scroll-thin::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 4px; }
  .scroll-thin::-webkit-scrollbar-thumb:hover { background: #9CA3AF; }
  /* 스크롤 가능하지만 스크롤바는 숨김 (사이드바용) */
  .scroll-hidden { -ms-overflow-style: none; scrollbar-width: none; }
  .scroll-hidden::-webkit-scrollbar { display: none; width: 0; height: 0; }

  /* =========================
   * 반응형 (3단계)
   * - 모바일:  ~767px
   * - 태블릿:  768~1023px
   * - 데스크톱: 1024px~
   * ========================= */

  /* 공통: 모바일에서 터치 타깃 확보 */
  @media (max-width: 767px) {
    body { font-size: 14px; }
    /* 모바일에서는 데스크톱 전용 요소 숨김 */
    .hide-mobile { display: none !important; }
    /* 모바일 전용 표시 */
    .only-mobile { display: flex !important; }
  }
  @media (min-width: 768px) {
    .only-mobile { display: none !important; }
  }

  /* 태블릿에서 패딩 살짝 조정 */
  @media (min-width: 768px) and (max-width: 1023px) {
    .hide-tablet { display: none !important; }
  }

  /* 모바일에서 AI 좌측 패널은 드로어로 */
  @media (max-width: 1023px) {
    .ai-panel-desktop { display: none !important; }
  }
  @media (min-width: 1024px) {
    .ai-panel-mobile-trigger { display: none !important; }
    .ai-panel-drawer { display: none !important; }
  }

  /* 로그인 화면 애니메이션 */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .login-animate { animation: fadeInUp 0.5s ease-out both; }

  /* Alert Drawer 슬라이드 애니메이션 */
  @keyframes slideInRight {
    from { transform: translateX(100%); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }

  /* 모바일에서 차트 최소 높이 보정 */
  @media (max-width: 767px) {
    .chart-mobile-h { height: 220px !important; }
  }
</style>
</head>
<body>
<div id="root">
  <div style="padding:40px;font-family:sans-serif;color:#666;text-align:center;">
    <div style="font-size:20px;margin-bottom:12px;">⏳ 대시보드 로딩 중...</div>
    <div style="font-size:13px;color:#999;">CDN에서 React/Recharts를 다운로드하고 있어요 (최초 5~10초 소요)</div>
    <div style="font-size:12px;color:#bbb;margin-top:20px;">30초 이상 이 화면이 지속되면 F12 → Console에서 에러를 확인해주세요.</div>
  </div>
</div>

<script>
  // CDN 로딩 진단
  window.addEventListener('load', function() {
    setTimeout(function() {
      var missing = [];
      if (typeof React === 'undefined') missing.push('React');
      if (typeof ReactDOM === 'undefined') missing.push('ReactDOM');
      if (typeof Recharts === 'undefined') missing.push('Recharts');
      if (typeof Babel === 'undefined') missing.push('Babel');
      if (missing.length > 0) {
        var root = document.getElementById('root');
        root.innerHTML = '<div style="padding:40px;font-family:sans-serif;">' +
          '<h2 style="color:#dc2626;">⚠ CDN 라이브러리 로드 실패</h2>' +
          '<p>다음 라이브러리를 불러오지 못했어요: <b>' + missing.join(', ') + '</b></p>' +
          '<p style="color:#666;font-size:13px;">원인: 인터넷 연결 문제 또는 방화벽 차단.</p>' +
          '<p style="color:#666;font-size:13px;">해결: (1) 인터넷 연결 확인 (2) F12 → Network 탭에서 실패한 요청 확인</p>' +
          '</div>';
      }
    }, 5000);
  });
</script>
<script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect, useRef } = React;
const {
  ResponsiveContainer, LineChart, Line, AreaChart, Area, BarChart, Bar,
  PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, Legend,
  ScatterChart, Scatter, ZAxis, Treemap, ComposedChart,
  RadarChart, Radar, PolarGrid, PolarAngleAxis, PolarRadiusAxis,
  ReferenceLine
} = Recharts;

/* =========================================================
 * 더미 데이터
 * ========================================================= */
// Make 톤 차트 팔레트 — 블루 그라데이션 우선 + 포인트 컬러 절제
// ═══════════════════════════════════════════════════════════════
// COLORS — 팀원 B "ShopIQ" 5 Tier 팔레트 흡수
//   기존 blue 4톤은 차트용으로 유지(primary~primary4)
//   tier*: 새 차트용 (alpha 0.65~0.7 반투명 + 진한 stroke)
// ═══════════════════════════════════════════════════════════════
const COLORS = {
  // ── 기존 블루 4톤 (호환 유지) ──
  primary:   '#2563EB',
  primary2:  '#60A5FA',
  primary3:  '#93C5FD',
  primary4:  '#DBEAFE',
  // ── 5 Tier (팀원 B DNA) — 차트 메인 ──
  cobalt:    '#1C5FFF',                  // 주색
  cobaltA:   'rgba(28,95,255,0.65)',    // 바 alpha
  cobaltL:   'rgba(28,95,255,0.10)',    // 배경 light
  emerald:   '#00A878',                  // 긍정/성장
  emeraldA:  'rgba(0,168,120,0.70)',
  emeraldL:  'rgba(0,168,120,0.10)',
  amber:     '#D4830A',                  // 주의
  amberA:    'rgba(212,131,10,0.70)',
  amberL:    'rgba(212,131,10,0.10)',
  crimson:   '#D93025',                  // 위험
  crimsonA:  'rgba(217,48,37,0.70)',
  crimsonL:  'rgba(217,48,37,0.10)',
  violet:    '#7C3AED',                  // AI/예측
  violetA:   'rgba(124,58,237,0.65)',
  violetL:   'rgba(124,58,237,0.10)',
  // ── 호환 alias ──
  success:   '#00A878',  // emerald
  warning:   '#D4830A',  // amber
  danger:    '#D93025',  // crimson
  ai:        '#7C3AED',  // violet
  aiDeep:    '#6D28D9',
  slate:     '#CBD5E1',
  mutedBar:  '#AEAEB2',  // 회색 바 (비강조)
  teal:      '#0D9488',
  pink:      '#DB2777',
  lime:      '#65A30D'
};
// 차트 팔레트: 블루 4톤 + 포인트 컬러 순서

// 일별 (2026.01.01 ~ 오늘) - 주말/평일 패턴 반영
const DAILY_SALES = (() => {
  const result = [];
  const monthFactors = { 0: 44.5, 1: 50.7, 2: 54.2, 3: 60.5 }; // 월별 평균 일매출 (억원)
  const start = new Date('2026-01-01');
  const end = new Date('2026-04-19');
  for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
    const m = d.getMonth();
    const dow = d.getDay(); // 0=일, 6=토
    const base = monthFactors[m] || 50;
    // 주말 저조, 월요일 피크, 금요일 둘째 피크
    const dowFactor = [0.85, 1.15, 1.05, 1.0, 0.95, 1.1, 0.9][dow];
    // 자연스러운 노이즈
    const noise = 0.85 + Math.sin(d.getDate() * 0.7) * 0.1 + (Math.random() - 0.5) * 0.15;
    const 매출 = Math.round(base * dowFactor * noise * 10) / 10;
    // 평균 일매출 ~50억 / 일 주문 ~820건 → 비율 ~16배 (객단가 약 61만원)
    const 주문 = Math.round(매출 * 16);
    result.push({
      date: d.toISOString().slice(0, 10),
      label: `${d.getMonth()+1}/${d.getDate()}`,
      매출,
      주문
    });
  }
  return result;
})();

    남성: Math.round(m)

// ───────────────────────────────────────────────────────────────
// 기간 필터 유틸: by_date 배열을 start~end 구간으로 잘라서 그룹 집계
// ───────────────────────────────────────────────────────────────
function filterByRange(arr, start, end) {
  if (!Array.isArray(arr)) return [];
  return arr.filter(r => r && r.date >= start && r.date <= end);
}

// rows: [{date, <groupKey>, ...metricKeys}] → group by groupKey, sum metrics
function aggregateBy(rows, groupKey, metricKeys) {
  const m = new Map();
  rows.forEach(r => {
    const k = r[groupKey];
    if (k == null) return;
    if (!m.has(k)) {
      const base = { [groupKey]: k };
      metricKeys.forEach(mk => { base[mk] = 0; });
      m.set(k, base);
    }
    const cur = m.get(k);
    metricKeys.forEach(mk => { cur[mk] += Number(r[mk] || 0); });
  });
  return Array.from(m.values());
}

function isFullRange(start, end) {
  return start <= '2026-01-01' && end >= '2026-04-19';
}

/* =========================================================

/* =========================================================
 * 기간(DateRange) 컨텍스트 & 유틸
 * - granularity: 'day' | 'month' | 'year'
 * - start/end: 'YYYY-MM-DD' 문자열
 * - 2025는 오픈은 했지만 데이터 없음 → hasDataInRange=false
 * - 2026.01.01 ~ 2026.04.19 구간에만 실데이터 있음
 * ========================================================= */
const DateRangeContext = React.createContext(null);

const TODAY = '2026-04-19';

const DATE_PRESETS = [
  { id: 'today',     label: '오늘',     granularity: 'day',   compute: () => ({ start: TODAY, end: TODAY }) },
  { id: 'week',      label: '최근 7일', granularity: 'day',   compute: () => ({ start: '2026-04-13', end: TODAY }) },
  { id: 'month',     label: '이번 달',  granularity: 'day',   compute: () => ({ start: '2026-04-01', end: TODAY }) },
  { id: 'last_month',label: '지난 달',  granularity: 'day',   compute: () => ({ start: '2026-03-01', end: '2026-03-31' }) },
  { id: 'qtd',       label: '분기',     granularity: 'month', compute: () => ({ start: '2026-04-01', end: TODAY }) },
  { id: 'ytd',       label: '올해',     granularity: 'month', compute: () => ({ start: '2026-01-01', end: TODAY }) },
  { id: 'all',       label: '전체',     granularity: 'month', compute: () => ({ start: '2025-01-01', end: TODAY }) }
];

// 두 날짜 범위가 겹치는지
function rangesOverlap(aStart, aEnd, bStart, bEnd) {
  return aStart <= bEnd && bStart <= aEnd;
}

// 현재 선택 구간에 실데이터가 있는가? (2026.01.01 ~ TODAY와 겹치는지)
function hasDataInRange(start, end) {
  // 실데이터가 없는 구간이어도 프로토타입 그래프(더미/샘플)는 항상 보이도록 허용
  // (date input min/max가 2025-01-01 ~ TODAY로 제한되어 있어 이 범위 내에서는 true)
  return (
    rangesOverlap(start, end, DATA_START, DATA_END) ||
    rangesOverlap(start, end, '2025-01-01', TODAY)
  );
}

// 선택 구간을 사람이 읽기 좋은 텍스트로
function formatRangeSummary(start, end, granularity) {
  if (start === end) return `${start}`;
  return `${start} ~ ${end}`;
}

// granularity 라벨
const GRANULARITY_LABELS = { day: '일별', month: '월별', year: '연별' };

function DateRangeProvider({ children }) {
  const [granularity, setGranularity] = useState('month');
  const [start, setStart] = useState('2026-01-01');
  const [end, setEnd] = useState(TODAY);

  const hasData = hasDataInRange(start, end);
  const rangeSummary = formatRangeSummary(start, end, granularity);

  const applyPreset = (preset) => {
    const r = preset.compute();
    setStart(r.start);
    setEnd(r.end);
    setGranularity(preset.granularity);
  };

  const value = {
    granularity, setGranularity,
    start, setStart,
    end, setEnd,
    hasData, rangeSummary,
    applyPreset,
    today: TODAY
  };

  return <DateRangeContext.Provider value={value}>{children}</DateRangeContext.Provider>;
}

// 검색 컨텍스트: 세부 탭 내부 필터로 전달
const SearchContext = React.createContext({ search: null, setSearch: () => {}, consumeSearch: () => null });

function SearchProvider({ children }) {

  // 탭이 컨텍스트를 읽고 즉시 초기화해 재적용 루프 방지

}

/* =========================================================
 * RealData 컨텍스트 — data/agg/*.json lazy-load
 * - 각 탭에서 useRealData('orders') 형태로 호출
 * - 없으면 fetch → 캐시. fetch 실패 시 null 유지(기존 더미 데이터 fallback)
 * - file://로 열면 fetch가 막혀서 null이 될 수 있으니 컴포넌트는 null 처리 필요
 * ========================================================= */
const RealDataContext = React.createContext({ get: () => ({ data: null, loading: false, error: null }) });

const REAL_DATA_KEYS = [
  'meta', 'sales', 'orders', 'product', 'region',
  'delivery', 'customer', 'marketing', 'search',
  'inventory', 'insights', 'copilot'
];

function RealDataProvider({ children }) {
  const [cache, setCache] = useState({});      // { key: data }
  const [loading, setLoading] = useState({});  // { key: true/false }
  const [errors, setErrors] = useState({});    // { key: message }

  const fetchKey = React.useCallback((key) => {
    if (cache[key] !== undefined || loading[key]) return;
    setLoading(prev => ({ ...prev, [key]: true }));
    fetch(`data/agg/${key}.json`, { cache: 'no-cache' })
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(json => {
        setCache(prev => ({ ...prev, [key]: json }));
        setLoading(prev => ({ ...prev, [key]: false }));
      })
      .catch(err => {
        console.warn(`[RealData] ${key}.json fetch failed:`, err.message);
        setCache(prev => ({ ...prev, [key]: null }));
        setLoading(prev => ({ ...prev, [key]: false }));
        setErrors(prev => ({ ...prev, [key]: err.message }));
      });
  }, [cache, loading]);

  // 앱 시작 시 meta.json은 선적재
  React.useEffect(() => { fetchKey('meta'); }, [fetchKey]);

  const get = React.useCallback((key) => {
    if (!REAL_DATA_KEYS.includes(key)) {
      return { data: null, loading: false, error: `unknown key: ${key}` };
    }
    // 첫 호출이면 fetch 트리거
    if (cache[key] === undefined && !loading[key]) {
      // 렌더 중 setState 방지: microtask로 미룸
      Promise.resolve().then(() => fetchKey(key));
    }
    return {
      data: cache[key] ?? null,
      loading: !!loading[key],
      error: errors[key] ?? null
    };
  }, [cache, loading, errors, fetchKey]);

  return <RealDataContext.Provider value={{ get }}>{children}</RealDataContext.Provider>;
}

function useRealData(key) {
  const ctx = React.useContext(RealDataContext);

/* =========================================================
 * 그룹 드롭다운 메뉴 (데이터 ▾ / 운영&마케팅 ▾)

function GroupDropdown({ group, tabs, active, onChange }) {
  const [open, setOpen] = useState(false);
  const activeTabInGroup = tabs.find(t => t.id === active);
  const isActive = !!activeTabInGroup;

  const activeCls = group.id === 'ops'
    ? 'bg-emerald-50 text-emerald-700 border-emerald-200'
    : 'bg-blue-50 text-blue-700 border-blue-200';
  const inactiveCls = 'text-gray-600 hover:bg-gray-50 border-transparent';

  return (
    <div className="relative">
      <button
        onClick={() => setOpen(!open)}
        className={`h-9 px-3 rounded flex items-center gap-1.5 text-[13px] font-medium border transition-colors whitespace-nowrap ${
          isActive ? activeCls : inactiveCls
        }`}
      >
        <Icon name={group.icon} className="w-3.5 h-3.5" stroke={2} />
        <span>{group.label}</span>
        {isActive && (
          <span className="text-[11px] opacity-70 ml-0.5">· {activeTabInGroup.label}</span>
        )}
        <Icon name="right" className={`w-3 h-3 transition-transform ${open ? 'rotate-90' : 'rotate-90'}`} stroke={2.5} />
      </button>

      {open && (
        <>
          <div className="fixed inset-0 z-30" onClick={() => setOpen(false)} />
          <div className="absolute left-0 top-full mt-1.5 w-[260px] bg-white border border-gray-200 rounded-lg shadow-lg z-40 py-1.5">
            <div className="px-3 py-1 text-[10px] font-bold text-gray-400 uppercase tracking-wide">{group.label}</div>
            {tabs.map(tab => {
              const selected = active === tab.id;
              return (
                <button
                  key={tab.id}
                  onClick={() => { onChange(tab.id); setOpen(false); }}
                  className={`w-full text-left px-3 py-2 flex items-center gap-2 text-[13px] transition-colors ${
                    selected
                      ? (group.id === 'ops' ? 'bg-emerald-50 text-emerald-700 font-semibold' : 'bg-blue-50 text-blue-700 font-semibold')
                      : 'text-gray-700 hover:bg-gray-50'
                  }`}
                >
                  <Icon name={tab.icon} className="w-3.5 h-3.5 flex-shrink-0" stroke={2} />
                  <span className="flex-1">{tab.label}</span>
                  {selected && <Icon name="check" className="w-3.5 h-3.5 flex-shrink-0" stroke={2.5} />}
                </button>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}

// 글로벌 검색 (탭/상품/고객/카테고리 전방위)
function GlobalSearch({ onGotoTab, currentTab, compact = false }) {
  const [q, setQ] = useState('');
  const [open, setOpen] = useState(false);
  const [focusIdx, setFocusIdx] = useState(0);
  // 실제 사용자의 검색/선택 기록. 최대 4개, 앞쪽이 최신.
  // { label, hint, action, ts }
  const [recents, setRecents] = useState([]);
  const inputRef = useRef(null);
  const { setSearch } = useSearch();

  // 무결과 fallback을 위한 탭 제안 휴리스틱 (키워드 → 관련 탭 2~3개)
  const suggestTabs = (kw) => {
    const k = (kw || '').toLowerCase();
    const suggest = [];
    const add = (id, label, reason) => { if (!suggest.find(s => s.id === id)) suggest.push({ id, label, reason }); };
    const has = (...words) => words.some(w => k.includes(w.toLowerCase()));
    if (has('매출','판매','수익','결제','금액','객단가','gmv')) { add('sales','매출/결제','매출·결제 관련 분석'); add('product','상품','상품별 매출 비교'); }
    if (has('고객','회원','유저','vip','세그먼트','rfm','이탈')) { add('customer','고객 분석','고객 세그먼트/코호트'); add('orders','주문 현황','고객 주문 내역'); }
    if (has('지역','서울','부산','경기','인천','대구','대전','광주','울산','세종','강원','제주','전북','전남','충북','충남','경북','경남')) { add('region','지역 분석','지역별 구매 현황'); }
    if (has('상품','카테고리','재고','sku','반품','품절','뷰티','패션','식품','가전','도서','스포츠','반려','유아')) { add('product','상품','상품·카테고리 분석'); add('inventory','재고','재고/반품 관리'); }
    if (has('주문','배송','운송장','ord-','취소','환불')) { add('orders','주문 현황','주문·배송 상태'); add('inventory','재고','배송 처리 상태'); }
    if (has('검색','키워드','seo','광고','마케팅','캠페인','크리에이티브')) { add('search','검색','검색 키워드 분석'); add('marketing','마케팅','캠페인 성과'); }
    if (has('트렌드','추세','이상','알림','인사이트','요약','ai')) { add('insights','AI 인사이트','자동 요약·이상 탐지'); }
    return suggest.slice(0, 3);
  };

  // 검색 색인: 탭 + 샘플 주문/상품/카테고리/고객/액션. action에 세부 payload 포함.
  const INDEX = useMemo(() => {
    const items = [];
    (typeof TABS !== 'undefined' ? TABS : []).forEach(t => {
      items.push({ kind: '페이지', label: t.label, sub: t.group === 'data' ? '데이터' : t.group === 'ops' ? '운영 & 마케팅' : 'AI', icon: t.icon, action: { type: 'tab', id: t.id } });

    ['뷰티/건강','침구/홈패브릭','스포츠/레저','컴퓨터/액세서리','패션 의류','식품/음료','유아동/출산','반려동물','가전','도서/음반'].forEach(c => {
      items.push({ kind: '카테고리', label: c, sub: `상품 탭에서 ${c} 필터`, icon: 'tag', action: { type: 'tab', id: 'product', kind: 'category', value: c } });
    });
    ['서울','경기','부산','인천','대구','대전','광주','울산','세종','강원'].forEach(r => {

    ['ORD-20260419-0423','ORD-20260419-0422','ORD-20260418-0421','ORD-20260418-0420','ORD-20260417-0419'].forEach(id => {

      .map(it => {

      { label: '급상승 검색어',    hint: '검색 & 키워드 · 상승 탭',         why: '트렌드 키워드 포착', icon: 'search',
        action: { type: 'tab', id: 'search' } },
    ];

    // 인접 탭 매핑: 현재 탭에서 자연스럽게 이어지는 후보 id
    const ADJACENT = {
      orders:    ['sales','inventory','customer'],
      sales:     ['product','marketing','insights'],
      product:   ['inventory','search','sales'],
      region:    ['customer','sales','insights'],
      delivery:  ['orders','inventory'],
      customer:  ['marketing','orders','insights'],
      marketing: ['search','customer','sales'],
      search:    ['product','marketing','insights'],
      inventory: ['orders','product','sales'],
      copilot:   ['insights','chatbot'],
      chatbot:   ['insights','customer'],
      insights:  ['chatbot','copilot','customer']
    };
    const adj = new Set(ADJACENT[currentTab] || []);

    // 스코어링
    const scored = pool.map(c => {
      let s = 50; // 기본
      const cid = c.action?.id;
      // 시간대 가중치
      if (c.boost && c.boost[timeBand]) s += c.boost[timeBand];
      // 현재 탭과 동일하면 덜 추천 (이미 보고 있음)
      if (cid === currentTab) s -= 40;
      // 인접 탭이면 가중
      else if (adj.has(cid)) s += 18;
      // 최근에 이미 본 탭이면 살짝 감점 (지겹지 않게)
      if (recentIds.has(cid)) s -= 15;
      // 최근에 탐색한 필터 종류와 다른 kind면 살짝 가점 (다양성)
      if (c.action?.kind && !recentKinds.has(c.action.kind)) s += 6;
      // 주말엔 마케팅/캠페인 톤 다운
      if ((day === 0 || day === 6) && cid === 'marketing') s -= 10;
      // 약간의 안정 jitter (동점 방지)
      s += ((cid || '').length % 5);
      return { ...c, score: s };
    });
    scored.sort((a,b) => b.score - a.score);
    return scored.slice(0, 4);
  }, [currentTab, recents]);

  // 최근 검색 기록에 추가 (최대 4개, 최신이 앞, label 기준 dedup)
  const recordRecent = (item) => {
    if (!item || !item.label) return;
    setRecents(prev => {
      const filtered = prev.filter(r => r.label !== item.label);
      return [{ label: item.label, hint: item.hint || item.sub, action: item.action, ts: Date.now() }, ...filtered].slice(0, 4);
    });
  };

  const removeRecent = (label) => {
    setRecents(prev => prev.filter(r => r.label !== label));
  };

  const pick = (item) => {
    if (item?.action?.type === 'tab') {
      const { id, kind, value } = item.action;
      // 세부 payload가 있으면 SearchContext에 적재
      if (kind && value !== undefined) {
        setSearch({ tab: id, kind, value, ts: Date.now() });
      } else {
        setSearch(null);
      }
      onGotoTab(id);
      // 실제 선택한 검색 기록 저장 (label이 있는 경우만)
      if (item.label) recordRecent(item);
    }
    setQ('');
    setOpen(false);
    inputRef.current?.blur();
  };

  const onKey = (e) => {
    if (e.key === 'ArrowDown') { e.preventDefault(); setFocusIdx(i => Math.min((results.length || 1) - 1, i + 1)); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); setFocusIdx(i => Math.max(0, i - 1)); }
    else if (e.key === 'Enter') {
      e.preventDefault();
      if (results.length) pick(results[focusIdx]);
      else if (q.trim()) {
        // 결과 없음 → 첫 제안 탭 or 챗봇으로 전달
        const s = suggestTabs(q);
        if (s.length) pick({ action: { type: 'tab', id: s[0].id } });
        else pick({ action: { type: 'tab', id: 'chatbot', kind: 'question', value: q } });
      }
    } else if (e.key === 'Escape') {
      setOpen(false);
      inputRef.current?.blur();
    }
  };

  // 전역 단축키 (Ctrl/⌘+K)
  useEffect(() => {
    const h = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        inputRef.current?.focus();
        setOpen(true);
      }
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);

  return (
    <div className={`relative ${compact ? 'w-full' : 'w-64 lg:w-80'}`}>
      {/* Make 스타일 검색바: h-10, bg-gray-50, focus ring */}
      <div className={`flex items-center gap-2.5 h-10 px-3.5 rounded-lg transition-all ${open ? 'bg-white ring-2 ring-blue-500/20' : 'bg-gray-50 hover:bg-white'}`} style={open ? {border:'1px solid #2563EB'} : {border:'1px solid var(--border)'}}>
        <Icon name="search" className="w-4 h-4 flex-shrink-0 text-gray-400" />
        <input
          ref={inputRef}
          type="text"
          value={q}
          onChange={e => { setQ(e.target.value); setOpen(true); }}
          onFocus={() => setOpen(true)}
          onKeyDown={onKey}
          placeholder="Search insights..."
          className="flex-1 bg-transparent outline-none text-[13px] font-medium min-w-0"
          style={{color:'var(--text-1)'}}
        />
        {q && (
          <button onClick={() => { setQ(''); inputRef.current?.focus(); }} className="p-0.5 hover:opacity-60" style={{color:'var(--text-3)'}} aria-label="지우기">
            <Icon name="close" className="w-3.5 h-3.5" />
          </button>
        )}
        {!compact && (
          <span className="text-[10px] font-bold bg-white rounded px-1.5 py-0.5 font-mono" style={{color:'var(--text-3)', border:'1px solid var(--border)'}}>⌘K</span>
        )}
      </div>

      {open && (
        <>
          <div className="fixed inset-0 z-30" onClick={() => setOpen(false)} />
          <div className="absolute left-0 right-0 top-full mt-1.5 bg-white border border-gray-200 rounded-lg shadow-xl z-40 max-h-[60vh] overflow-auto scroll-thin">
            {q.trim() === '' ? (
              <div className="p-2">
                {recents.length > 0 && (
                  <>
                    <div className="flex items-center justify-between px-2 py-1.5">
                      <div className="text-[10px] font-bold text-gray-400 uppercase tracking-wide">최근 검색</div>
                      <button
                        onClick={() => setRecents([])}
                        className="text-[10px] text-gray-400 hover:text-gray-600"
                        title="모두 지우기"
                      >
                        모두 지우기
                      </button>
                    </div>
                    {recents.map((s, i) => (
                      <div key={i} className="group flex items-center rounded hover:bg-gray-50">
                        <button
                          onClick={() => pick(s)}
                          className="flex-1 min-w-0 text-left px-2 py-1.5 text-[12.5px] flex items-center gap-2"
                        >
                          <Icon name="clock" className="w-3.5 h-3.5 text-gray-400 flex-shrink-0" />
                          <span className="flex-1 truncate text-gray-700">{s.label}</span>
                          <span className="text-[10.5px] text-gray-400 truncate hidden sm:block max-w-[140px]">{s.hint}</span>
                        </button>
                        <button
                          onClick={(e) => { e.stopPropagation(); removeRecent(s.label); }}
                          className="flex-shrink-0 p-1 mr-1 rounded text-gray-300 hover:text-gray-600 hover:bg-gray-200 opacity-0 group-hover:opacity-100 transition-opacity"
                          title="이 기록 삭제"
                          aria-label={`${s.label} 삭제`}
                        >
                          <Icon name="close" className="w-3 h-3" />
                        </button>
                      </div>
                    ))}
                  </>
                )}
                <div className={`flex items-center gap-1.5 px-2 py-1.5 ${recents.length > 0 ? 'mt-1' : ''}`}>
                  <Icon name="sparkles" className="w-3 h-3 text-violet-500" stroke={2.5} />
                  <span className="text-[10px] font-bold text-violet-600 uppercase tracking-wide">AI 추천 검색</span>
                  <span className="text-[9.5px] text-gray-400">현재 컨텍스트 기반</span>
                </div>
                {aiSuggestions.map((s, i) => (
                  <button
                    key={i}
                    onClick={() => pick(s)}
                    className="w-full text-left px-2 py-1.5 rounded hover:bg-violet-50 text-[12.5px] flex items-center gap-2 group"
                  >
                    <div className="w-6 h-6 rounded-md bg-violet-50 text-violet-600 flex items-center justify-center flex-shrink-0">
                      <Icon name={s.icon || 'sparkles'} className="w-3.5 h-3.5" stroke={2} />
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="text-[12.5px] font-medium text-gray-800 truncate">{s.label}</div>
                      <div className="text-[10.5px] text-gray-500 truncate">
                        <span className="text-violet-600">· {s.why}</span>
                        {s.hint ? <span className="text-gray-400"> · {s.hint}</span> : null}
                      </div>
                    </div>
                    <span className="text-[10px] text-gray-300 group-hover:text-violet-500 flex-shrink-0">↵</span>
                  </button>
                ))}
              </div>
            ) : results.length > 0 ? (
              <div className="p-1">
                {results.map((r, i) => (
                  <button
                    key={i}
                    onMouseEnter={() => setFocusIdx(i)}
                    onClick={() => pick(r)}
                    className={`w-full text-left px-2.5 py-2 rounded flex items-center gap-2.5 ${focusIdx === i ? 'bg-blue-50' : 'hover:bg-gray-50'}`}
                  >
                    <div className={`w-7 h-7 rounded-md flex items-center justify-center flex-shrink-0 ${
                      r.kind === '페이지' ? 'bg-blue-50 text-blue-600' :
                      r.kind === '카테고리' ? 'bg-emerald-50 text-emerald-600' :
                      r.kind === '지역' ? 'bg-amber-50 text-amber-600' :
                      r.kind === '주문' ? 'bg-gray-100 text-gray-600' :
                      r.kind === '고객' ? 'bg-rose-50 text-rose-600' :
                      'bg-violet-50 text-violet-600'
                    }`}>
                      <Icon name={r.icon || 'search'} className="w-3.5 h-3.5" stroke={2} />
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="text-[13px] font-medium text-gray-900 truncate">{r.label}</div>
                      <div className="text-[11px] text-gray-500 truncate">{r.kind} · {r.sub}</div>
                    </div>
                    {focusIdx === i && <span className="text-[10px] text-gray-400 flex-shrink-0">↵</span>}
                  </button>
                ))}
              </div>
            ) : (
              (() => {
                const suggested = suggestTabs(q);
                return (
                  <div className="p-3">
                    <div className="px-1 py-1 text-[12px] text-gray-500">
                      "<span className="font-medium text-gray-700">{q}</span>"에 정확히 맞는 결과가 없습니다.
                    </div>
                    {suggested.length > 0 && (
                      <>
                        <div className="px-1 mt-2 text-[10px] font-bold text-gray-400 uppercase tracking-wide">관련 탭 제안</div>
                        <div className="mt-1 space-y-0.5">
                          {suggested.map((s, i) => (
                            <button
                              key={i}
                              onClick={() => pick({ label: q, hint: s.reason, action: { type: 'tab', id: s.id } })}
                              className="w-full text-left px-2 py-1.5 rounded hover:bg-gray-50 flex items-center gap-2 group"
                            >
                              <div className="w-7 h-7 rounded-md bg-blue-50 text-blue-600 flex items-center justify-center flex-shrink-0">
                                <Icon name="chart" className="w-3.5 h-3.5" stroke={2} />
                              </div>
                              <div className="flex-1 min-w-0">
                                <div className="text-[13px] font-medium text-gray-900 truncate">{s.label}</div>
                                <div className="text-[11px] text-gray-500 truncate">{s.reason}</div>
                              </div>
                              <span className="text-[10px] text-gray-300 group-hover:text-gray-500 flex-shrink-0">↵</span>
                            </button>
                          ))}
                        </div>
                      </>
                    )}
                    <div className="mt-2 pt-2 border-t border-gray-100">
                      <button
                        onClick={() => pick({ label: q, hint: 'AI 챗봇 질문', action: { type: 'tab', id: 'chatbot', kind: 'question', value: q } })}
                        className="w-full text-left px-2 py-1.5 rounded hover:bg-violet-50 flex items-center gap-2 group"
                      >
                        <div className="w-7 h-7 rounded-md bg-violet-100 text-violet-600 flex items-center justify-center flex-shrink-0">
                          <Icon name="sparkles" className="w-3.5 h-3.5" stroke={2} />
                        </div>
                        <div className="flex-1 min-w-0">
                          <div className="text-[13px] font-medium text-violet-700 truncate">AI 챗봇에 "{q}" 물어보기</div>
                          <div className="text-[11px] text-gray-500 truncate">패턴 매칭으로 요약·차트 제공</div>
                        </div>
                        <span className="text-[10px] text-gray-300 group-hover:text-violet-500 flex-shrink-0">↵</span>
                      </button>
                    </div>
                  </div>
                );
              })()
            )}
          </div>
        </>
      )}
    </div>
  );
}

  const unreadCount = alerts.filter(a => a.unread).length;

    alertFilter === 'all' ? true :
    alertFilter === 'unread' ? a.unread :

  );

/* =========================================================
 * 탭 0. 주문 현황
 * ========================================================= */
function OrdersTab() {
  const { hasData, start, end } = useDateRange();
  const { search: globalSearch, consumeSearch } = useSearch();
  const { data: realOrders, loading: realLoading } = useRealData('orders');
  const [statusFilter, setStatusFilter] = useState('all');
  const [regionFilter, setRegionFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [sortKey, setSortKey] = useState('date');
  const [sortDir, setSortDir] = useState('desc');

  // 검색 → 주문/고객 입력에 자동 적용
  useEffect(() => {
    const payload = consumeSearch('orders');
    if (payload && (payload.kind === 'order' || payload.kind === 'customer')) {
      setSearch(payload.value);
      setStatusFilter('all');
      setRegionFilter('all');
    }
  }, [globalSearch]);

  // 실데이터 어댑팅 (있을 때만)
  const recentOrders = useMemo(() => {
    if (realOrders && Array.isArray(realOrders.recent)) {
      return realOrders.recent.map(o => ({
        id: o.order_id,
        customer: o.customer,
        region: o.region,
        amount: o.amount,
        payment: o.pay,
        status: o.status,
        date: o.purchased_at,
        category: o.category,
        items: o.items
      }));
    }
    return RECENT_ORDERS;
  }, [realOrders]);

  // 필터/정렬 적용 (기간 필터 포함)
  const filteredOrders = useMemo(() => {
    if (!hasData) return [];
    // date 포맷: 실데이터는 'YYYY-MM-DD HH:MM:SS' 또는 'YYYY-MM-DD', 더미는 'MM-DD HH:MM'
    // 기간 필터는 실데이터에만 의미있게 적용, 더미는 기존대로 유지
    const isReal = realOrders && Array.isArray(realOrders.recent);
    let list = recentOrders.filter(o => {
      if (statusFilter !== 'all' && o.status !== statusFilter) return false;
      if (regionFilter !== 'all' && !o.region.startsWith(regionFilter)) return false;
      if (search && !o.id.toLowerCase().includes(search.toLowerCase()) && !o.customer.includes(search)) return false;
      if (isReal && o.date) {
        const d = String(o.date).slice(0, 10); // 'YYYY-MM-DD'
        if (d < start || d > end) return false;
      }
      return true;
    });
    list.sort((a, b) => {
      const dir = sortDir === 'asc' ? 1 : -1;
      if (sortKey === 'amount') return (a.amount - b.amount) * dir;
      if (sortKey === 'date') return a.date > b.date ? dir : -dir;
      return 0;
    });
    return list;
  }, [hasData, recentOrders, statusFilter, regionFilter, search, sortKey, sortDir, start, end, realOrders]);

  const toggleSort = (key) => {
    if (sortKey === key) setSortDir(sortDir === 'asc' ? 'desc' : 'asc');
    else { setSortKey(key); setSortDir('desc'); }
  };

  const statusColor = (s) => ({
    '배송완료': 'bg-emerald-50 text-emerald-700',
    '배송중':   'bg-blue-50 text-blue-700',
    '처리중':   'bg-amber-50 text-amber-700',
    '취소':     'bg-rose-50 text-rose-700',
    '품절':     'bg-gray-100 text-gray-600'
  }[s] || 'bg-gray-100 text-gray-600');

  const kpiColor = (c) => ({
    emerald: 'bg-emerald-50 text-emerald-700 border-emerald-100',
    blue:    'bg-blue-50 text-blue-700 border-blue-100',
    amber:   'bg-amber-50 text-amber-700 border-amber-100',
    rose:    'bg-rose-50 text-rose-700 border-rose-100'
  }[c]);

  // 상태별 KPI: recent 주문을 기간으로 필터한 뒤 상태 집계 (기간 반영)
  //  - 기간이 전체 데이터 범위와 같으면 status_distribution 전체 집계 사용
  //  - 그 외에는 recent(최근 200건)에서 기간 필터 후 집계
  const statusKpi = useMemo(() => {
    if (realOrders && Array.isArray(realOrders.recent) && Array.isArray(realOrders.status_distribution)) {
      // 기간이 전체 데이터 범위일 때 전체 분포 사용
      const useFull = (start <= '2026-01-01') && (end >= '2026-04-19');
      let map = {};
      if (useFull) {
        realOrders.status_distribution.forEach(s => { map[s.status] = s.count; });
      } else {
        realOrders.recent
          .filter(o => {
            const d = String(o.purchased_at || '').slice(0, 10);
            return d >= start && d <= end;
          })
          .forEach(o => { map[o.status] = (map[o.status] || 0) + 1; });
      }
      const total = Object.values(map).reduce((a, b) => a + b, 0) || 1;
      const combine = (keys) => keys.reduce((a, k) => a + (map[k] || 0), 0);
      const shipped = combine(['배송완료']);
      const shipping = combine(['배송중']);
      const processing = combine(['준비중', '결제완료', '결제대기', '처리중']);
      const canceled = combine(['취소', '품절']);
      return [
        { key: 'delivered',  label: '배송완료', count: shipped,    pct: +(shipped/total*100).toFixed(1),   color: 'emerald' },
        { key: 'shipping',   label: '배송중',   count: shipping,   pct: +(shipping/total*100).toFixed(1),  color: 'blue' },
        { key: 'processing', label: '처리중',   count: processing, pct: +(processing/total*100).toFixed(1),color: 'amber' },
        { key: 'canceled',   label: '취소/품절', count: canceled,   pct: +(canceled/total*100).toFixed(1),  color: 'rose' }
      ];
    }
    return ORDER_STATUS_KPI;
  }, [realOrders, start, end]);

  return (
    <div className="space-y-3">
      {/* 상태별 KPI */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
        {statusKpi.map((k) => (
          <Card key={k.key} className={`cursor-pointer hover:shadow-sm transition ${hasData && statusFilter === k.label ? 'ring-2 ring-blue-400' : ''} ${!hasData ? 'bg-gray-50/50' : ''}`}
                onClick={() => hasData && setStatusFilter(statusFilter === k.label ? 'all' : k.label)}>
            <div className="flex items-center justify-between mb-1.5">
              <span className="text-[12px] font-medium text-gray-500">{k.label}</span>
              {hasData ? (
                <span className={`text-[10px] font-semibold px-1.5 py-0.5 rounded border ${kpiColor(k.color)}`}>{k.pct}%</span>
              ) : (
                <span className="text-[10px] text-gray-400">요약 없음</span>
              )}
            </div>
            {hasData ? (
              <>
                <div className="text-[22px] font-bold tnum text-gray-900">{fmtNum(k.count)}</div>
                <div className="text-[11px] text-gray-400 mt-0.5">건</div>
              </>
            ) : (
              <>
                <div className="text-[22px] font-bold tnum text-gray-300">—</div>
                <div className="text-[11px] text-gray-300 mt-0.5">데이터 없음</div>
              </>
            )}
          </Card>
        ))}
      </div>

      {/* 시간대별 + 배송 파이프라인 */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-2">
        <ChartCard empty={!hasData} title="시간대별 주문 유입" unit="최근 24시간" aiComment="21~22시 피크(주문량 최대)로, 저녁 시간대 프로모션 효과가 큼. 새벽 3~5시 유입은 미미." height={280}>
          <ResponsiveContainer>
            <AreaChart data={HOURLY_ORDERS} margin={{ top: 10, right: 10, left: 0, bottom: 0 }}>
              <defs><BlueAreaGradient id="colorHour" /></defs>
              <CartesianGrid strokeDasharray={GRID_DASH} stroke={GRID_STROKE} vertical={false} />
              <XAxis dataKey="hour" tick={AXIS_TICK} tickLine={TICK_LINE} axisLine={AXIS_LINE} interval={2} />
              <YAxis tick={AXIS_TICK} tickLine={TICK_LINE} axisLine={AXIS_LINE} />
              <Tooltip content={<RichTooltip formatter={(v) => fmtNum(v) + '건'} hint="저녁 프로모션 효과 구간" />} cursor={{ stroke: COLORS.primary, strokeWidth: 1, strokeDasharray: '3 3' }} />
              <Area type="monotone" dataKey="주문" stroke={COLORS.primary} strokeWidth={2.5} fill="url(#colorHour)" dot={false} activeDot={{ r: 5, stroke: '#fff', strokeWidth: 2 }} />
            </AreaChart>
          </ResponsiveContainer>
        </ChartCard>

        <ChartCard empty={!hasData} title="배송 파이프라인" unit="단계별 누적 전환" aiComment="결제→출고 구간에서 1.3%p 손실. 재고 부족 또는 출고 지연 점검 필요." height={280}>
          <div className="space-y-2.5 px-1">
            {DELIVERY_PIPELINE.map((s, i) => (
              <div key={s.stage} className="relative">
                <div className="flex items-center justify-between mb-1">
                  <div className="flex items-center gap-1.5">
                    <div className="w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold text-white" style={{ backgroundColor: s.color }}>{i+1}</div>
                    <span className="text-[13px] font-medium text-gray-800">{s.stage}</span>
                  </div>
                  <div className="flex items-center gap-2">
                    <span className="text-[13px] font-bold tnum text-gray-900">{fmtNum(s.count)}</span>
                    <span className="text-[11px] text-gray-400 tnum w-12 text-right">{s.pct}%</span>
                  </div>
                </div>
                <div className="h-2 bg-gray-100 rounded-full overflow-hidden">
                  <div className="h-full rounded-full transition-all" style={{ width: `${s.pct}%`, backgroundColor: s.color }} />
                </div>
                {i < DELIVERY_PIPELINE.length - 1 && (
                  <div className="text-[10px] text-gray-400 mt-1 ml-6">
                    전환율 {(DELIVERY_PIPELINE[i+1].pct / s.pct * 100).toFixed(1)}%
                    <span className="text-rose-500 ml-1">(-{(s.pct - DELIVERY_PIPELINE[i+1].pct).toFixed(1)}%p)</span>
                  </div>
                )}
              </div>
            ))}
          </div>
        </ChartCard>
      </div>

      {/* 주문 목록 */}
      <Card padding="p-0">
        <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 px-3 py-2 border-b border-gray-100">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="text-[13px] font-semibold text-gray-800">주문 목록</span>
            {hasData ? (
              <span className="text-[11px] text-gray-400">({filteredOrders.length}/{RECENT_ORDERS.length}건)</span>
            ) : (
              <span className="text-[11px] text-gray-400">(요약 없음)</span>
            )}
          </div>
          <div className="flex items-center gap-1.5 flex-wrap">
            <select
              value={statusFilter}
              onChange={(e) => setStatusFilter(e.target.value)}
              className="text-[12px] border border-gray-200 rounded px-2 py-1 bg-white"
            >
              <option value="all">상태 전체</option>
              <option value="배송완료">배송완료</option>
              <option value="배송중">배송중</option>
              <option value="처리중">처리중</option>
              <option value="취소">취소</option>
            </select>
            <select
              value={regionFilter}
              onChange={(e) => setRegionFilter(e.target.value)}
              className="text-[12px] border border-gray-200 rounded px-2 py-1 bg-white"
            >
              <option value="all">지역 전체</option>
              <option value="서울">서울</option>
              <option value="경기">경기</option>
              <option value="부산">부산</option>
              <option value="인천">인천</option>
              <option value="대구">대구</option>
              <option value="대전">대전</option>
              <option value="광주">광주</option>
              <option value="울산">울산</option>
            </select>
            <input
              type="text"
              value={search}
              onChange={(e) => setSearch(e.target.value)}
              placeholder="주문번호, 고객명 검색"
              className="text-[12px] border border-gray-200 rounded px-2 py-1 w-36 sm:w-48"
            />
            <button
              onClick={() => { setStatusFilter('all'); setRegionFilter('all'); setSearch(''); }}
              className="text-[12px] text-gray-500 hover:text-gray-700 px-2 py-1"
              title="필터 초기화"
            >
              초기화
            </button>
          </div>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-[12px] min-w-[720px]">
            <thead className="bg-gray-50 text-gray-600">
              <tr>
                <th className="text-left px-3 py-2 font-medium">주문번호</th>
                <th className="text-left px-3 py-2 font-medium">고객명</th>
                <th className="text-left px-3 py-2 font-medium">지역</th>

                  className="text-right px-3 py-2 font-medium cursor-pointer hover:bg-gray-100 select-none"

                >

                </th>
                <th className="text-left px-3 py-2 font-medium">결제</th>
                <th className="text-left px-3 py-2 font-medium">상태</th>
                <th
                  className="text-left px-3 py-2 font-medium cursor-pointer hover:bg-gray-100 select-none"
                  onClick={() => toggleSort('date')}
                >
                  주문일시 {sortKey === 'date' && (sortDir === 'asc' ? '▲' : '▼')}
                </th>
              </tr>
            </thead>
            <tbody className="divide-y divide-gray-100">
              {!hasData ? (
                <tr>
                  <td colSpan={7} className="text-center py-10 text-gray-400 text-[12px]">
                    <div className="font-medium text-gray-500">요약이 없습니다</div>
                    <div className="text-[11px] text-gray-400 mt-1">선택한 기간(2026-01 이전)에 주문 기록이 없습니다</div>
                  </td>
                </tr>
              ) : filteredOrders.length === 0 ? (
                <tr>
                  <td colSpan={7} className="text-center py-8 text-gray-400 text-[12px]">
                    조건에 맞는 주문이 없습니다.
                  </td>
                </tr>
              ) : filteredOrders.map((o) => (
                <tr key={o.id} className="hover:bg-gray-50">
                  <td className="px-3 py-2 font-mono text-[11px] text-gray-500">{o.id}</td>
                  <td className="px-3 py-2 font-medium">{o.customer}</td>
                  <td className="px-3 py-2 text-gray-600">{o.region}</td>
                  <td className="px-3 py-2 text-right tnum font-medium">₩{fmtNum(o.amount)}</td>
                  <td className="px-3 py-2 text-gray-600">{o.payment}</td>
                  <td className="px-3 py-2">
                    <span className={`text-[11px] px-1.5 py-0.5 rounded ${statusColor(o.status)}`}>{o.status}</span>
                  </td>
                  <td className="px-3 py-2 text-gray-500 tnum whitespace-nowrap">{o.date}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

/* =========================================================
 * 탭 1. 매출/결제
 * ========================================================= */
function SalesTab() {
  const { hasData, granularity, start, end } = useDateRange();
  const { search: globalSearch, consumeSearch } = useSearch();
  const { data: realSales } = useRealData('sales');
  const { data: realMeta } = useRealData('meta');
  const [drilldown, setDrilldown] = useState(null); // { type, data }
  const [highlightPayment, setHighlightPayment] = useState(null);

  useEffect(() => {
    const payload = consumeSearch('sales');
    if (payload && payload.kind === 'payment') {
      setHighlightPayment(payload.value);
      const found = (typeof PAYMENT_METHODS !== 'undefined' ? PAYMENT_METHODS : []).find(p => p.name === payload.value);
      if (found) setDrilldown({ type: 'payment', data: { ...found, fill: null } });
    }
  }, [globalSearch]);

  // granularity에 따라 차트 데이터/축 키 전환
  const trendData = useMemo(() => {
    if (!hasData) return [];
    if (granularity === 'year') return YEARLY_SALES.filter(y => y.hasData);
    // 일/월별: 실데이터 우선
    if (granularity === 'day') {
      if (realSales?.daily) {
        // 실데이터 daily → DAILY_SALES 호환 포맷
        const mapped = realSales.daily
          .filter(d => d.date >= start && d.date <= end)
          .map(d => ({
            date: d.date,
            label: d.date.slice(5),  // 'MM-DD'
            // KRW → 억원 (fmtB 호환)
            매출: +(d.total / 1e8).toFixed(2),
            주문: null
          }));
        // 선택 구간에 실데이터가 비어 있으면 샘플 데이터로 폴백
        if (mapped.length > 0) return mapped;
      }
      return DAILY_SALES.filter(d => d.date >= start && d.date <= end);
    }
    // month: 실데이터 monthly 우선
    if (realSales?.monthly) {
      const mapped = realSales.monthly
        .filter(m => m.month >= start.slice(0, 7) && m.month <= end.slice(0, 7))
        .map(m => {
          const 매출 = +(m.total / 1e8).toFixed(2);
          // 팀원 B ShopIQ DNA — 전년 동월 시뮬레이션 (약 -18% + 소음)
          const 전년 = +(매출 * (0.80 + Math.sin(parseInt(m.month.slice(5)) * 1.2) * 0.04)).toFixed(2);
          return {
            ym: m.month,
            month: m.month.slice(5) + '월',
            매출,
            전년,
            주문: null
          };
        });
      if (mapped.length > 0) return mapped;
    }
    return MONTHLY_SALES.filter(m => m.ym >= start.slice(0, 7) && m.ym <= end.slice(0, 7));
  }, [hasData, granularity, start, end, realSales]);

  const xKey = granularity === 'year' ? 'year' : granularity === 'day' ? 'label' : 'month';
  const trendTitle = granularity === 'year' ? '연도별 매출 추이'
                   : granularity === 'day'  ? '일별 매출 추이'
                   : '월별 매출 추이';

  // KPI 집계 (기존 더미 경로)
  const kpi = useMemo(() => {
    if (!hasData) return null;
    const base = granularity === 'day' ? trendData : MONTHLY_SALES.filter(m => m.ym >= start.slice(0,7) && m.ym <= end.slice(0,7));
    const total매출 = base.reduce((s, x) => s + (x.매출 || 0), 0);
    const total주문 = base.reduce((s, x) => s + (x.주문 || 0), 0);
    const avgOrder = total주문 > 0 ? Math.round(total매출 * 100000000 / total주문) : 0;
    return { total매출, total주문, avgOrder };
  }, [hasData, granularity, trendData, start, end]);

  // 실데이터 daily를 선택 기간으로 재집계한 KPI
  // - revenue: sum(total)
  // - orders: sum(all 결제수단 count 불명, daily에 count 없음) → monthly에도 없음.
  //   → orders는 trendData 포인트 수 기반 추정이 아닌 "실데이터 30일 기준 비율"을 유지
  const periodKpi = useMemo(() => {
    if (!realSales?.daily) return null;
    const inRange = realSales.daily.filter(d => d.date >= start && d.date <= end);
    if (inRange.length === 0) return null;
    const revenue = inRange.reduce((s, d) => s + (d.total || 0), 0);
    // 이전 기간(동일 길이) 비교
    const ms = 86400000;
    const lenDays = Math.max(1, Math.round((new Date(end) - new Date(start)) / ms) + 1);
    const prevEnd = new Date(new Date(start).getTime() - ms).toISOString().slice(0,10);
    const prevStart = new Date(new Date(prevEnd).getTime() - (lenDays - 1) * ms).toISOString().slice(0,10);
    const prevRange = realSales.daily.filter(d => d.date >= prevStart && d.date <= prevEnd);
    const prevRevenue = prevRange.reduce((s, d) => s + (d.total || 0), 0);
    const deltaPct = prevRevenue > 0 ? ((revenue - prevRevenue) / prevRevenue) * 100 : null;
    // 주문 수/AOV는 sales.json에 없으므로 meta.json 비율로 추정
    const metaKpi = realMeta?.kpi;
    const scale = metaKpi && metaKpi.total_revenue.value > 0 ? revenue / metaKpi.total_revenue.value : 1;
    const ordersEst = metaKpi ? Math.round(metaKpi.total_orders.value * scale) : null;
    const aovEst = ordersEst && ordersEst > 0 ? Math.round(revenue / ordersEst) : null;
    return {
      revenue, deltaPct, ordersEst, aovEst,
      rangeLabel: `${start} ~ ${end} (${lenDays}일)`,
      prevLabel: `${prevStart} ~ ${prevEnd}`
    };
  }, [realSales, realMeta, start, end]);

  const spark = MONTHLY_SALES.map(m => ({ v: m.매출 }));
  // v는 억원 단위. "₩5.6B" 포맷 유지를 위해 1000으로 나눔 (프로토타입 표기)
  const fmtB = (v) => '₩' + (v / 1000).toFixed(1) + 'B';
  // 원(won) → 사람이 읽기 좋은 ₩X억 포맷
  const fmtWon = (v) => {
    if (v == null) return '—';
    if (v >= 1e8) return '₩' + (v / 1e8).toFixed(1) + '억';
    if (v >= 1e4) return '₩' + (v / 1e4).toFixed(0) + '만';
    return '₩' + fmtNum(v);
  };

  // 실데이터 어댑터들
  const paymentMethods = useMemo(() => {
    if (realSales?.payment_distribution) {
      return realSales.payment_distribution.map(p => ({
        name: p.pay_kr, value: p.count, amount: p.amount
      }));
    }
    return PAYMENT_METHODS;
  }, [realSales]);

  const amountHist = useMemo(() => {
    if (realSales?.amount_histogram) return realSales.amount_histogram;
    return ORDER_AMOUNT_HIST;
  }, [realSales]);

  const installmentData = useMemo(() => {
    if (realSales?.installment_distribution?.length) {
      return realSales.installment_distribution;
    }
    return INSTALLMENT;
  }, [realSales]);

  // 실데이터 KPI (meta.json: 최근 30일 기준 + delta)
  const realKpi = realMeta?.kpi;
  const deltaStr = (d) => d == null ? '—' : (d >= 0 ? '+' : '') + d.toFixed(1) + '%';
  const deltaTrend = (d) => (d == null ? 'up' : (d >= 0 ? 'up' : 'down'));
  // top_pay: 문자열 형태. payment_distribution에서 점유율 계산.
  const topPay = useMemo(() => {
    if (!realSales?.kpi?.top_pay || !realSales?.payment_distribution) return null;
    const total = realSales.payment_distribution.reduce((a, p) => a + (p.count || 0), 0) || 1;
    const name = realSales.kpi.top_pay;
    const row = realSales.payment_distribution.find(p => p.pay_kr === name);
    if (!row) return { name, share: 0 };
    return { name, share: (row.count / total) * 100 };
  }, [realSales]);

  return (
    <div className="space-y-4">
      {/* AI 인사이트 배너 — Figma Make 톤 포인트 */}
      {hasData && (
        <AIInsightBanner
          insight="3월 매출 상승의 72%가 신상품 출시 + 주말 프로모션에 기인 — 4월 동일 전략 반복 권장"
          cta="자세히"
          onClick={() => {}}
        />
      )}
      {/* KPI */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        <KPICard empty={!hasData} label="총 매출 (선택 기간)"
          value={periodKpi ? fmtWon(periodKpi.revenue)
                 : (realKpi ? fmtWon(realKpi.total_revenue.value)
                 : (kpi ? fmtB(kpi.total매출) : '—'))}
          change={periodKpi ? deltaStr(periodKpi.deltaPct)
                 : (realKpi ? deltaStr(realKpi.total_revenue.delta_pct) : '+12.4%')}
          trend={periodKpi ? deltaTrend(periodKpi.deltaPct)
                 : (realKpi ? deltaTrend(realKpi.total_revenue.delta_pct) : 'up')}
          sub={periodKpi ? 'vs 이전 동일기간'
                 : (realKpi ? 'vs 이전 30일'
                 : (kpi ? `${trendData.length}${granularity === 'day' ? '일' : granularity === 'month' ? '개월' : '년'} 합산` : null))}
          spark={spark} />
        <KPICard empty={!hasData} label="평균 주문 금액"
          value={periodKpi?.aovEst ? '₩' + fmtNum(periodKpi.aovEst)
                 : (realKpi ? '₩' + fmtNum(realKpi.aov.value)
                 : (kpi && kpi.avgOrder ? '₩' + fmtNum(kpi.avgOrder) : '—'))}
          change={realKpi ? deltaStr(realKpi.aov.delta_pct) : '+3.1%'}
          trend={realKpi ? deltaTrend(realKpi.aov.delta_pct) : 'up'}
          sub={periodKpi ? '기간 추정' : (realKpi ? 'vs 이전 30일' : 'vs 이전 ₩53,700')} spark={spark} />
        <KPICard empty={!hasData} label="주문 건수"
          value={periodKpi?.ordersEst ? fmtNum(periodKpi.ordersEst)
                 : (realKpi ? fmtNum(realKpi.total_orders.value)
                 : (kpi ? fmtNum(kpi.total주문) : '—'))}
          change={realKpi ? deltaStr(realKpi.total_orders.delta_pct) : '+8.7%'}
          trend={realKpi ? deltaTrend(realKpi.total_orders.delta_pct) : 'up'}
          sub={periodKpi ? '기간 추정' : (realKpi ? 'vs 이전 30일' : 'vs 이전기간 비교')} spark={spark} />
        <KPICard empty={!hasData} label={topPay ? '최다 결제수단' : '평균 할부 횟수'}
          value={topPay ? topPay.name : '2.4개월'}
          change={topPay ? topPay.share.toFixed(0) + '%' : '-0.2%'}
          trend={topPay ? 'up' : 'down'}
          sub={topPay ? '비중 점유율' : '일시불 52%'} spark={spark} />
      </div>

      {/* 차트 4 */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-2">
        <ChartCard empty={!hasData} title={trendTitle} unit="단위: 억원 · 실선: 2026 · 점선: 2025(전년) · 포인트 클릭 → 상세" aiComment="3월 매출 ₩168억으로 분기 최고. 4월은 진행 중(19일치)이라 단순 비교는 주의. 전년 대비 전 구간 +20% 이상." height={280}>
          <ResponsiveContainer>
            <ComposedChart data={trendData} margin={{ top: 10, right: 10, left: 0, bottom: 0 }}
              onClick={(e) => e?.activePayload?.[0] && setDrilldown({ type: 'trend', data: e.activePayload[0].payload })}>
              <defs><BlueAreaGradient id="colorSales" /></defs>
              <CartesianGrid strokeDasharray={GRID_DASH} stroke={GRID_STROKE} vertical={false} />
              <XAxis dataKey={xKey} tick={AXIS_TICK} tickLine={TICK_LINE} axisLine={AXIS_LINE} interval={granularity === 'day' ? 'preserveStartEnd' : 0} />
              <YAxis tick={AXIS_TICK} tickLine={TICK_LINE} axisLine={AXIS_LINE} />
              <Tooltip content={<RichTooltip formatter={(v) => fmtNum(v) + ' 억원'} hint="클릭하여 상세 보기" />} cursor={{ stroke: COLORS.primary, strokeWidth: 1, strokeDasharray: '3 3' }} />
              {granularity === 'month' && (
                <Line type="monotone" dataKey="전년" stroke={COLORS.mutedBar} strokeWidth={1.5} strokeDasharray="4 3" dot={false} name="2025 (전년)" />
              )}
              <Area type="monotone" dataKey="매출" stroke={COLORS.primary} strokeWidth={2.5} fill="url(#colorSales)" dot={false}
                activeDot={{ r: 5, stroke: '#fff', strokeWidth: 2, style: { cursor: 'pointer' } }} name="2026" />
            </ComposedChart>
          </ResponsiveContainer>
        </ChartCard>

        <ChartCard empty={!hasData} title="결제수단 분포" unit="전체 주문 기준 · 조각 클릭 → 상세" aiComment="신용카드 비중 74%로 압도적. 체크카드 비중은 1.5%로 낮아 프로모션 여지가 있음." height={280}>
          <ResponsiveContainer>
            <PieChart>
              <Pie data={paymentMethods} dataKey="value" nameKey="name" cx="50%" cy="50%" innerRadius={58} outerRadius={82} paddingAngle={3}
                onClick={(d) => setDrilldown({ type: 'payment', data: d })}
                style={{ cursor: 'pointer' }}>
                {paymentMethods.map((p, i) => (
                  <Cell key={i}
                    fill={highlightPayment === p.name ? COLORS.warning : [COLORS.primary, COLORS.primary2, COLORS.primary3, COLORS.primary4][i % 4]}
                    opacity={!highlightPayment || highlightPayment === p.name ? 1 : 0.3}
                    stroke={highlightPayment === p.name ? '#fff' : 'transparent'}
                    strokeWidth={highlightPayment === p.name ? 3 : 0} />
                ))}
              </Pie>
              <Tooltip content={<RichTooltip formatter={(v) => fmtNum(v) + '건'} hint="클릭하여 상세 보기" />} />
              <Legend wrapperStyle={{ fontSize: 12, paddingTop: 8 }} iconType="circle" />
            </PieChart>
          </ResponsiveContainer>
        </ChartCard>

        <ChartCard empty={!hasData} title="주문금액 분포" unit="히스토그램 · 막대 클릭 → 상세" height={260}>
          <ResponsiveContainer>
            <BarChart data={amountHist}>
              <CartesianGrid strokeDasharray={GRID_DASH} stroke={GRID_STROKE} vertical={false} />
              <XAxis dataKey="range" tick={AXIS_TICK} tickLine={TICK_LINE} axisLine={AXIS_LINE} />
              <YAxis tick={AXIS_TICK} tickLine={TICK_LINE} axisLine={AXIS_LINE} />
              <Tooltip content={<RichTooltip formatter={(v) => fmtNum(v) + '건'} hint="클릭하여 상세 보기" />} cursor={{ fill: 'rgba(37,99,235,0.05)' }} />
              <Bar dataKey="count" radius={BAR_RADIUS}
                onClick={(d) => setDrilldown({ type: 'amount', data: d })}
                style={{ cursor: 'pointer' }}>
                {amountHist.map((entry, i) => {
                  // 팀원 B ShopIQ DNA — 피크 3단 (emerald → cobalt → muted)
                  const max = Math.max(...amountHist.map(x => x.count));
                  const isPeak = entry.count === max;
                  const isHigh = entry.count > max * 0.7;
                  return (
                    <Cell key={i} fill={isPeak ? COLORS.emeraldA : (isHigh ? COLORS.cobaltA : COLORS.mutedBar)} />
                  );
                })}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </ChartCard>

        <ChartCard empty={!hasData} title="할부 횟수 분석" unit="건수" height={260}>
          <ResponsiveContainer>
            <BarChart data={installmentData} layout="vertical" margin={{ left: 10 }}>
              <CartesianGrid strokeDasharray={GRID_DASH} stroke={GRID_STROKE} horizontal={false} />
              <XAxis type="number" tick={AXIS_TICK} tickLine={TICK_LINE} axisLine={AXIS_LINE} />
              <YAxis type="category" dataKey="할부" tick={AXIS_TICK} tickLine={TICK_LINE} axisLine={AXIS_LINE} width={60} />
              <Tooltip content={<RichTooltip formatter={(v) => fmtNum(v) + '건'} />} cursor={{ fill: 'rgba(37,99,235,0.05)' }} />
              <Bar dataKey="건수" fill={COLORS.cobaltA} radius={BAR_RADIUS_H} />
            </BarChart>
          </ResponsiveContainer>
        </ChartCard>
      </div>

      {/* 팀원 B 흡수 — 요일별 패턴 + 분기 목표 */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-2">
        <ChartCard empty={!hasData} title="요일별 평균 매출 패턴" unit="단위: 억원 · 주중 vs 주말"
          aiComment="금요일이 주중 피크(+6%), 일요일이 최저. 주말 프로모션으로 격차 축소 가능."
          height={260}>
          <ResponsiveContainer>
            <BarChart data={DOW_PATTERN}>
              <CartesianGrid strokeDasharray={GRID_DASH} stroke={GRID_STROKE} vertical={false} />
              <XAxis dataKey="dow" tick={AXIS_TICK} tickLine={TICK_LINE} axisLine={AXIS_LINE} />
              <YAxis tick={AXIS_TICK} tickLine={TICK_LINE} axisLine={AXIS_LINE} />
              <Tooltip content={<RichTooltip formatter={(v) => fmtNum(v) + ' 억원'} />} cursor={{ fill: 'rgba(28,95,255,0.05)' }} />
              <Bar dataKey="매출" radius={BAR_RADIUS}>
                {DOW_PATTERN.map((d, i) => {
                  const max = Math.max(...DOW_PATTERN.map(x => x.매출));
                  const isPeak = d.매출 === max;
                  const isWeekend = d.dow === '토' || d.dow === '일';
                  return <Cell key={i} fill={isPeak ? COLORS.emeraldA : isWeekend ? COLORS.mutedBar : COLORS.cobaltA} />;
                })}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </ChartCard>

        <ChartCard empty={!hasData} title="분기 목표 대비 실적" unit="목표 달성률 · 단위: 억원"
          aiComment="Q1 99.6% 달성. Q2는 19일까지 29.8% 진행 — 월말 페이스 유지 시 달성 가능."
          height={260}>
          <ResponsiveContainer>
            <BarChart data={QUARTER_TARGET} layout="vertical" margin={{ left: 20 }}>
              <CartesianGrid strokeDasharray={GRID_DASH} stroke={GRID_STROKE} horizontal={false} />
              <XAxis type="number" tick={AXIS_TICK} tickLine={TICK_LINE} axisLine={AXIS_LINE} />
              <YAxis type="category" dataKey="quarter" tick={AXIS_TICK} tickLine={TICK_LINE} axisLine={AXIS_LINE} width={70} />
              <Tooltip content={<RichTooltip formatter={(v) => fmtNum(v) + ' 억원'} />} cursor={{ fill: 'rgba(28,95,255,0.05)' }} />
              <Legend wrapperStyle={{ fontSize: 11 }} />
              <Bar dataKey="목표" fill={COLORS.mutedBar} radius={BAR_RADIUS_H} />
              <Bar dataKey="실적" radius={BAR_RADIUS_H}>
                {QUARTER_TARGET.map((q, i) => (
                  <Cell key={i} fill={q.진행률 >= 90 ? COLORS.emeraldA : q.진행률 > 0 ? COLORS.cobaltA : 'transparent'} />
                ))}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </ChartCard>
      </div>

      {/* 드릴다운 모달 */}
      <DrilldownModal
        open={!!drilldown}
        onClose={() => setDrilldown(null)}
        title={
          drilldown?.type === 'trend' ? `${drilldown.data[xKey]} 매출 상세` :
          drilldown?.type === 'payment' ? `${drilldown?.data?.name || ''} 결제 상세` :
          drilldown?.type === 'amount' ? `${drilldown?.data?.range || ''} 주문금액 구간` :
          '상세'
        }
        subtitle={drilldown?.type === 'trend' ? '기간별 매출·주문·객단가 breakdown' : drilldown?.type === 'payment' ? '결제 수단별 주문 상세' : '금액대별 주문 패턴'}
      >
        {drilldown?.type === 'trend' && drilldown.data && (
          <div className="space-y-4">
            <div className="grid grid-cols-3 gap-3">
              <div className="bg-blue-50 rounded-lg p-3 border border-blue-100">
                <div className="text-[11px] text-blue-700 font-medium">매출</div>
                <div className="text-[20px] font-bold text-blue-900 mt-1 tnum">{fmtB(drilldown.data.매출 || 0)}</div>
              </div>
              <div className="bg-emerald-50 rounded-lg p-3 border border-emerald-100">
                <div className="text-[11px] text-emerald-700 font-medium">주문 건수</div>
                <div className="text-[20px] font-bold text-emerald-900 mt-1 tnum">{fmtNum(drilldown.data.주문 || 0)}</div>
              </div>
              <div className="bg-violet-50 rounded-lg p-3 border border-violet-100">
                <div className="text-[11px] text-violet-700 font-medium">평균 객단가</div>
                <div className="text-[20px] font-bold text-violet-900 mt-1 tnum">
                  ₩{fmtNum(drilldown.data.주문 ? Math.round((drilldown.data.매출 || 0) * 100000000 / drilldown.data.주문) : 0)}
                </div>
              </div>
            </div>
            <div className="bg-gray-50 rounded-lg p-3 border border-gray-100">
              <div className="text-[12px] font-semibold text-gray-700 mb-2">카테고리 비중 (추정)</div>
              <div className="space-y-1.5">
                {[
                  { name: '뷰티/건강', pct: 24 },
                  { name: '침구/홈패브릭', pct: 19 },
                  { name: '스포츠/레저', pct: 17 },
                  { name: '컴퓨터/액세서리', pct: 14 },
                  { name: '기타', pct: 26 }
                ].map((c, i) => (
                  <div key={i} className="flex items-center gap-2 text-[12px]">
                    <span className="w-28 text-gray-600">{c.name}</span>
                    <div className="flex-1 bg-white rounded-full h-2 overflow-hidden">
                      <div className="h-full bg-blue-500 rounded-full" style={{ width: `${c.pct * 3}%` }} />
                    </div>
                    <span className="w-10 text-right tnum text-gray-500">{c.pct}%</span>
                  </div>
                ))}
              </div>
            </div>
            <div className="bg-violet-50 rounded-lg p-3 border border-violet-100 flex gap-2">
              <Icon name="sparkles" className="w-4 h-4 text-violet-600 flex-shrink-0 mt-0.5" />
              <div className="text-[12px] text-violet-900 leading-relaxed">
                <span className="font-semibold">AI 분석:</span> 이 기간의 객단가는 평균 이상입니다. 고가 카테고리(뷰티/침구) 가중이 주요 요인.
                다음 기간 예측 시 해당 카테고리 재고를 우선 확보하는 것을 권장합니다.
              </div>
            </div>
          </div>
        )}
        {drilldown?.type === 'payment' && drilldown.data && (
          <div className="space-y-4">
            <div className="grid grid-cols-2 gap-3">
              <div className="bg-blue-50 rounded-lg p-3 border border-blue-100">

/* =========================================================
 * 탭 2. 상품/카테고리
